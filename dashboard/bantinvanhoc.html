<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HopVan - Bản Tin Văn Học</title>
    <meta property="og:title" content="HOPVAN - Nền Tảng Học & Luyện Thi Ngữ Văn" />
    <meta property="og:description" content="Nền tảng học tập Ngữ Văn tích hợp AI – hỗ trợ tự học thông minh, phân tích tác phẩm, luyện viết hiệu quả." />
    <meta property="og:image" content="https://hopvan.netlify.app/panel.webp" />
    <meta property="og:url" content="https://hopvan.netlify.app" />
    <meta property="og:type" content="article" />
    <link rel="icon" type="image/webp" href="../LOGO.WEBP" />
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --primary: #FF8F50;
            --primary-gradient: linear-gradient(135deg, #FF8F50, #FF5E62);
            --sidebar-width: 280px;

            /* BỘ MÀU SÁNG (Bắt buộc phải có để không bị lỗi lúc tắt Dark Mode) */
            --bg-body: #FFF5EC;
            --bg-glass: rgba(255, 255, 255, 0.4);
            --bg-card: rgba(255, 255, 255, 0.9);
            --bg-search: white;
            --bg-nav: rgba(255, 255, 255, 0.6);
            --border-card: rgba(255, 255, 255, 0.8);
            --text-heading: #2D3436;
            --text-body: #444;
            --text-muted: #94A3B8;
            --shadow-card: 0 15px 35px rgba(0,0,0,0.04);
        }

        /* BỘ MÀU TỐI (Khi có class .dark) */
        html.dark {
            --bg-body: #0f172a;       /* slate-900 */
            --bg-glass: rgba(15, 23, 42, 0.6);
            --bg-card: rgba(30, 41, 59, 0.85); /* slate-800 */
            --bg-search: #1e293b;
            --bg-nav: rgba(30, 41, 59, 0.6);
            --border-card: #334155;    /* slate-700 */
            --text-heading: #f8fafc;
            --text-body: #cbd5e1;
            --text-muted: #94a3b8;
            --shadow-card: 0 15px 35px rgba(0,0,0,0.3);
        }

        /* --- BASE --- */
        body { background-color: var(--bg-body); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-body); overflow-x: hidden; transition: background-color 0.3s ease; }

        /* --- LAYOUT FIX --- */
        #menu-placeholder { position: fixed; top: 0; left: 0; height: 100vh; z-index: 900; }

        /* --- ĐỒNG BỘ DARK MODE CHO MENU.JS --- */
        /* Chỉ áp dụng các CSS này khi HTML có class "dark" */
        
        html.dark #menu-placeholder aside, 
        html.dark #menu-placeholder .sidebar {
            background-color: var(--bg-card) !important;
            border-color: var(--border-card) !important;
        }

        html.dark #menu-placeholder aside > div,
        html.dark #menu-placeholder .sidebar > div {
            background-color: transparent !important;
            border-color: var(--border-card) !important;
        }

        html.dark #menu-placeholder button {
            background-color: var(--bg-body) !important; 
            border: 1px solid var(--border-card) !important;
            color: var(--text-muted) !important;
            box-shadow: none !important;
        }
        html.dark #menu-placeholder button:hover {
            background-color: var(--bg-search) !important;
            border-color: var(--primary) !important;
            color: var(--primary) !important;
        }

        html.dark #menu-placeholder .nav-item.active { 
            background: var(--primary-gradient) !important; 
            color: white !important; 
            border-color: transparent !important; 
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4) !important;
        }

        html.dark #menu-placeholder div[style*="background-color"] {
            background-color: var(--bg-body) !important;
            border-color: var(--border-card) !important;
        }

        html.dark #menu-placeholder [class*="border-"] { border-color: var(--border-card) !important; }
        html.dark #menu-placeholder .text-gray-800, 
        html.dark #menu-placeholder h1 { color: var(--text-heading) !important; }
        html.dark #menu-placeholder .text-gray-500, 
        html.dark #menu-placeholder .text-gray-400 { color: var(--text-muted) !important; }
        
        html.dark #menu-placeholder .nav-item { color: var(--text-muted) !important; transition: 0.3s; }
        html.dark #menu-placeholder .nav-item:hover { background-color: rgba(255, 143, 80, 0.1) !important; color: var(--primary) !important; }

        .main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            min-height: 100vh;
            padding: 40px 60px;
            
            /* SỬA LẠI 2 DÒNG NÀY ĐỂ ĐỒNG BỘ BIẾN DARK MODE */
            background: var(--bg-glass); 
            border-left: 1px solid var(--border-card);
            
            backdrop-filter: blur(20px);
        }

        /* --- TEXT STYLE --- */
        .text-gradient { 
            background: var(--primary-gradient); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 800;
        }
        
        .page-header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
        .page-title { font-size: 3rem; font-weight: 800; color: var(--text-heading); letter-spacing: -1px; margin-bottom: 5px; }
        .page-subtitle { font-size: 1rem; color: #888; font-weight: 600; }
        
        /* Search Box */
        .search-box-wrap { position: relative; max-width: 500px; margin: 25px auto 0; }
        .search-inp { 
            width: 100%; padding: 14px 25px 14px 55px; 
            border-radius: 20px; border: 2px solid white; 
            background: white; box-shadow: 0 10px 30px rgba(255,143,80,0.1); 
            font-weight: 600; outline: none; transition: 0.3s; 
        }
        .search-inp:focus { border-color: var(--primary); box-shadow: 0 15px 40px rgba(255,143,80,0.2); }
        .search-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: #FF8F50; font-size: 1.1rem; }

        /* --- MENU LOC (SCROLL) --- */
        .nav-wrapper { 
            display: flex; justify-content: center; margin-bottom: 40px; 
            position: relative; padding: 0 40px;
        }
        /* ĐÃ FIX: Tăng padding trái phải để bóng đổ không bị cắt */
        .nav-container {
            display: flex; gap: 12px; overflow-x: auto; 
            /* Padding: Trên 15px | Phải 20px | Dưới 25px | Trái 20px */
            padding: 15px 20px 25px 20px; 
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
            max-width: 1000px;
            scroll-behavior: smooth;
            /* Mẹo nhỏ: giúp vùng scroll bắt đầu cách lề trái một chút */
            scroll-padding-left: 20px;
        }
        .nav-container::-webkit-scrollbar { display: none; }
        
        /* Thiết kế nút mượt mà, bo tròn căng hơn */
        .nav-btn {
            white-space: nowrap; padding: 12px 28px; border-radius: 50px; 
            font-weight: 800; font-size: 0.85rem; color: #94A3B8; 
            background: rgba(255, 255, 255, 0.6); border: 2px solid transparent; 
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .nav-btn:hover { 
            color: var(--primary); 
            background: white;
            border-color: rgba(255, 143, 80, 0.3);
            transform: translateY(-3px); 
            box-shadow: 0 10px 25px rgba(255, 143, 80, 0.1);
        }
        .nav-btn.active { 
            background: var(--primary-gradient); color: white; 
            border-color: transparent; 
            box-shadow: 0 12px 25px rgba(255, 94, 98, 0.35); 
            transform: translateY(-3px);
        }

        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 40px; height: 40px; border-radius: 50%; background: white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); color: var(--primary);
            cursor: pointer; z-index: 10; transition: 0.2s;
        }
        .nav-arrow:hover { transform: translateY(-50%) scale(1.1); background: var(--primary); color: white; }
        .nav-prev { left: 0; }
        .nav-next { right: 0; }

        /* --- CARD GIAO DIỆN MỚI --- */
        .news-grid { 
            display: grid; 
            grid-template-columns: repeat(1, 1fr); 
            gap: 30px; 
        }
        @media (min-width: 768px) { .news-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { .news-grid { grid-template-columns: repeat(3, 1fr); } }

        /* --- NÂNG CẤP CARD GIAO DIỆN (ĐÃ CĂN TRÁI TEXT) --- */
        .card { 
            background: rgba(255, 255, 255, 0.9); border-radius: 36px; overflow: hidden; /* Sửa 3px thành 36px */
            box-shadow: 0 15px 35px rgba(0,0,0,0.04); 
            border: 1px solid rgba(255,255,255,0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; display: flex; flex-direction: column;
            position: relative; height: 100%;
        }
        .card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 25px 60px rgba(255, 143, 80, 0.15); 
            background: white;
        }
        
        /* Đã tăng lề và độ bo góc của ảnh con để hài hòa với card cha */
        .c-img-box { height: 220px; overflow: hidden; position: relative; margin: 12px 12px 0; border-radius: 28px; }
        .c-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .card:hover .c-img { transform: scale(1.08); }
        
        /* Badge cho card thường (Grid) - Vị trí tuyệt đối */
        .c-badge { 
            position: absolute; top: 15px; left: 15px; 
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            padding: 8px 16px; border-radius: 50px; 
            font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            color: var(--primary); box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            z-index: 2;
        }

        /* Body của card - Nơi chứa text */
        .c-body { 
            padding: 25px 20px; flex-grow: 1; display: flex; flex-direction: column;
            /* THÊM 2 DÒNG NÀY ĐỂ CĂN TRÁI TOÀN BỘ NỘI DUNG */
            align-items: flex-start;
            text-align: left;
        }

        .c-title { 
            font-size: 1.25rem; font-weight: 800; line-height: 1.4; 
            color: #1E293B; margin-bottom: 12px; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            transition: color 0.3s;
        }
        .card:hover .c-title { color: #FF8F50; }
        
        .c-desc { 
            font-size: 0.95rem; color: #64748B; line-height: 1.7; margin-bottom: 25px; flex-grow: 1;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
            font-family: 'Merriweather', serif; font-weight: 300;
        }

        .c-footer {
            /* Footer dùng space-between nên không bị ảnh hưởng bởi căn trái ở trên */
            border-top: 1px dashed #E2E8F0; padding-top: 18px; margin-top: auto;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.8rem; color: #94A3B8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
            width: 100%; /* Đảm bảo footer rộng full card */
        }
        .read-link { 
            color: var(--primary); display: flex; align-items: center; gap: 5px; 
            transition: all 0.3s; background: rgba(255, 143, 80, 0.1); padding: 8px 16px; border-radius: 50px;
        }
        .card:hover .read-link { gap: 10px; background: var(--primary); color: white; }

        /* --- FEATURED CARD (Đã sửa ảnh bo tròn 4 góc lọt lòng) --- */
        .featured-card {
            grid-column: 1 / -1; /* Chiếm full chiều ngang */
            display: grid; grid-template-columns: 1.5fr 1fr; gap: 0;
            /* Đồng bộ border-radius 36px và border mờ giống card nhỏ */
            background: white; border-radius: 36px; overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05); margin-bottom: 20px;
            cursor: pointer; min-height: 380px; /* Dùng min-height cho an toàn */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .featured-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 25px 60px rgba(255, 143, 80, 0.2); 
        }
        
        /* ĐÃ FIX: Chỉnh lại margin đều 4 phía để ảnh nằm lọt vào trong */
        .featured-card .c-img-box { 
            height: auto; /* Để tự động tính toán chiều cao */
            align-self: stretch; /* Kéo giãn cho bằng chiều cao cột bên phải */
            margin: 10px; /* QUAN TRỌNG: Cách đều 4 cạnh 10px */
            border-radius: 24px; /* Bo tròn góc ảnh */
        }

        /* FIX RIÊNG CHO FEATURED CARD ĐỂ NÓ CŨNG CĂN TRÁI */
        .featured-card .c-body {
            padding: 40px;
            justify-content: center; /* Căn giữa theo chiều dọc */
            align-items: flex-start; /* Căn trái theo chiều ngang */
            text-align: left;
        }
        .featured-card .c-title { font-size: 2.2rem; }
        
        /* LOADING */
        .loading-state { text-align: center; padding: 100px 0; color: #ccc; font-weight: 600; }

        /* --- MOBILE MENU FIX (ĐÃ SỬA) --- */
        .mobile-header { display: none; }
        
        @media (max-width: 1023px) {
            /* 1. Header: Nằm thấp nhất trong nhóm nổi */
            .mobile-header { 
                display: flex; position: fixed; top: 0; left: 0; right: 0; height: 70px; 
                background: rgba(255,255,255,0.98); backdrop-filter: blur(10px);
                align-items: center; padding: 0 20px; 
                box-shadow: 0 4px 20px rgba(0,0,0,0.05);
                z-index: 90; /* Thấp hơn Overlay */
            }
            
            #menu-placeholder { width: 0; }
            
            /* 2. Overlay: Nằm đè lên Header */
            #sidebar-overlay { 
                display: block; position: fixed; inset: 0; 
                background: rgba(0,0,0,0.5); backdrop-filter: blur(3px);
                z-index: 99; /* Cao hơn Header */
                opacity: 0; visibility: hidden; transition: 0.3s;
            }
            #sidebar-overlay.active { opacity: 1; visibility: visible; }

            /* 3. Sidebar: Nằm trên cùng (Cao nhất) */
            aside, .sidebar { 
                position: fixed !important; 
                left: -285px !important; /* Giấu sang trái */
                top: 0; bottom: 0; 
                width: 280px; 
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important; 
                z-index: 100 !important; /* Cao nhất */
                background: white !important; 
                box-shadow: 5px 0 30px rgba(0,0,0,0.1);
                display: flex !important; flex-direction: column; /* Đảm bảo layout flex */
            }
            
            /* Class kích hoạt: Trượt ra */
            aside.open, .sidebar.open { transform: translateX(285px) !important; }
            
            /* Đẩy nội dung xuống để không bị Header che */
            .main-content { 
                margin-left: 0; width: 100%; 
                padding: 90px 20px 40px; 
            }
            
            .nav-wrapper { padding: 0; } .nav-arrow { display: none; }
            .nav-container { padding: 0 10px; }
            
            .featured-card { grid-template-columns: 1fr; height: auto; }
            .featured-card .c-img-box { height: 200px; }
            .featured-card .c-body { padding: 25px; }
            .featured-card .c-title { font-size: 1.5rem; }
            
            .page-title { font-size: 2.2rem; }
            .page-subtitle { font-size: 0.9rem; }
        }

        /* Background Blobs */
        .background-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: floatBlob 10s infinite alternate; }
        .blob-1 { width: 500px; height: 500px; background: #FCA96A; top: -100px; left: -100px; }
        .blob-2 { width: 400px; height: 400px; background: #FCD5B5; bottom: -50px; right: -50px; animation-delay: -5s; }
        .blob-3 { width: 300px; height: 300px; background: #FFD1D1; top: 40%; left: 40%; animation-delay: -2s; }

/* --- GLOBAL SCROLLBAR STYLE --- */

/* 1. Thiết lập độ rộng/cao của thanh trượt */
::-webkit-scrollbar {
    width: 10px;  /* Độ rộng cho thanh dọc */
    height: 10px; /* Độ cao cho thanh ngang */
}

/* 2. Thiết lập rãnh trượt (Track) - Nền chìm */
::-webkit-scrollbar-track {
    background: rgba(255, 143, 80, 0.05); /* Màu cam cực nhạt, gần như trong suốt */
    border-radius: 10px;
}

/* 3. Thiết lập tay nắm (Thumb) - Phần di chuyển */
::-webkit-scrollbar-thumb {
    background-color: rgba(255, 143, 80, 0.3); /* Mặc định là cam nhạt */
    border-radius: 10px; /* Bo tròn mềm mại */
    
    /* Mẹo: Tạo viền trong suốt để thanh trượt trông nhỏ hơn và "lơ lửng" */
    border: 2px solid transparent;
    background-clip: content-box;
    transition: background-color 0.3s ease;
}

/* 4. Hiệu ứng khi di chuột vào (Hover) */
::-webkit-scrollbar-thumb:hover {
    background-color: #FF8F50; /* Đổi sang màu cam chính thương hiệu */
    border: 1px solid transparent; /* Làm thanh trượt to ra một chút khi hover */
}

/* 5. (Tùy chọn) Ẩn nút mũi tên 2 đầu (nếu trình duyệt hiển thị) */
::-webkit-scrollbar-button {
    display: none;
}

/* --- HEADER ACTIONS (SEARCH + FAV BUTTON) --- */
.header-actions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px; /* Khoảng cách giữa search và nút tim */
    max-width: 600px;
    margin: 28px auto 0;
    padding: 18px 10px;
}

/* Chỉnh lại thanh search để nó tự co giãn */
.search-box-wrap {
    flex-grow: 1;
    margin: 0 !important; /* Gỡ bỏ margin cũ */
}

/* Nút Yêu thích vuông bo góc */
.btn-love-mode {
    width: 54px; height: 54px;
    border-radius: 20px;
    background: white;
    border: 2px solid white;
    box-shadow: 0 10px 30px rgba(255, 143, 80, 0.1);
    color: #ff4757;
    font-size: 1.4rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    flex-shrink: 0;
}

.btn-love-mode:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(255, 71, 87, 0.2);
    background: #fff0f0;
}

/* Trạng thái ĐANG XEM yêu thích */
.btn-love-mode.active {
    background: linear-gradient(135deg, #ff4757, #ff6b81);
    color: white;
    box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4);
    animation: pulseRed 2s infinite; /* Hiệu ứng tim đập */
}

@keyframes pulseRed {
    0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
}

    </style>
</head>
<body>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="mobile-header lg:hidden">
        <button onclick="toggleSidebar()" class="text-orange-500 text-2xl mr-4"><i class="fas fa-bars"></i></button>
        <div class="flex items-center gap-2">
            <img src="../LOGO.WEBP" alt="Logo" class="w-8 h-8">
            <span class="font-black text-orange-500 text-lg">HOPVAN</span>
        </div>
    </div>
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="menu-placeholder"></div>

    <main class="main-content">
        
        <div class="page-header" style="margin-bottom: 50px;">
            <div style="display: inline-block; background: rgba(255, 143, 80, 0.1); padding: 8px 20px; border-radius: 50px; color: #FF8F50; font-weight: 800; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px;">Thư viện tri thức</div>
            <h1 class="page-title" style="font-size: 3.5rem;">Bản Tin <span class="text-gradient">Văn Học</span></h1>
            <p class="page-subtitle" style="font-size: 1.1rem; max-width: 600px; margin: 11px auto 0; line-height: 1.6;">Khám phá kho tàng dẫn chứng, lý luận và bài văn mẫu chất lượng cao dành riêng cho bạn.</p>
            
        <div class="header-actions" style="margin-top: 20px; gap: 15px;">
            <div class="search-box-wrap">
                <input type="text" id="search-input" class="search-inp" placeholder="Nhập tên tác phẩm, tác giả hoặc từ khóa..." style="padding: 18px 25px 18px 60px; font-size: 1rem; border-radius: 24px;">
                <i class="fas fa-search search-icon" style="font-size: 1.2rem; left: 25px;"></i>
            </div>

            <button onclick="toggleFavorites()" id="btn-love-mode" class="btn-love-mode" title="Xem bộ sưu tập" style="width: 60px; height: 60px; border-radius: 22px;">
                <i class="fas fa-heart"></i>
            </button>
        </div>

        <div class="nav-wrapper">
            <button class="nav-arrow nav-prev" onclick="scrollNav(-1)"><i class="fas fa-chevron-left"></i></button>
            <div class="nav-container" id="nav-scroll-container">
                <button class="nav-btn active" onclick="filterData('all', this)">Tất cả</button>
                <button class="nav-btn" onclick="filterData('dauchan', this)">Dấu chân thời đại</button>
                <button class="nav-btn" onclick="filterData('chandung', this)">Chân dung bút lực</button>
                <button class="nav-btn" onclick="filterData('diahat', this)">Địa hạt chữ nghĩa</button>
                <button class="nav-btn" onclick="filterData('maicau', this)">Mài câu sáng chữ</button>
                <button class="nav-btn" onclick="filterData('vetsang', this)">Vệt sáng ngôn từ</button>
                <button class="nav-btn" onclick="filterData('liluan', this)">Lí luận văn học</button>
                <button class="nav-btn" onclick="filterData('cuango', this)">Cửa ngõ văn chương</button>
                <button class="nav-btn" onclick="filterData('khoinguon', this)">Khơi nguồn diễn đạt</button>
            </div>
            <button class="nav-arrow nav-next" onclick="scrollNav(1)"><i class="fas fa-chevron-right"></i></button>
        </div>

        <div id="content-area">
            <div class="loading-state">
                <i class="fas fa-spinner fa-spin text-3xl mb-3 text-orange-300"></i>
                <br>Đang tải dữ liệu...
            </div>
        </div>

    </main>

    <script type="module" src="gam.js"></script>    
    <script src="../chatbot.js"></script>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Import Menu
        import { initMenu } from "./menu.js";

        const firebaseConfig = { apiKey: "AIzaSyAJ9C2biYeiLPmhakzLZ4mEqfO9_VgPSZE", authDomain: "hopvan-9a648.firebaseapp.com", projectId: "hopvan-9a648", storageBucket: "hopvan-9a648.appspot.com", messagingSenderId: "429347196227", appId: "1:429347196227:web:917b8d019f0efd0f7833f6", measurementId: "G-1BG8PSRG0R" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        initMenu(app, 'news');

        let allArticles = [];
        let favIdsCache = [];
        let currentFilter = 'all';
        let isFavMode = false;

        const CAT_CONFIG = {
            'dauchan':  { name: 'Dấu chân thời đại' },
            'chandung': { name: 'Chân dung bút lực' },
            'diahat':   { name: 'Địa hạt chữ nghĩa' },
            'maicau':   { name: 'Mài câu sáng chữ' },
            'vetsang':  { name: 'Vệt sáng ngôn từ' },
            'liluan':   { name: 'Lí luận văn học' },
            'cuango':   { name: 'Cửa ngõ văn chương' },
            'khoinguon': { name: 'Khơi nguồn diễn đạt' }
        };

        const getCatInfo = (code) => CAT_CONFIG[code] || { name: 'Bài viết' };

        // 1. Kiểm tra Theme & Gọi Load Data
        onAuthStateChanged(auth, async (user) => { 
            if(!user) window.location.href="../log.html"; 
            else {
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists() && userDoc.data().theme === 'dark') {
                        document.documentElement.classList.add('dark');
                    }
                } catch(e) {}
                loadData(); 
            }
        });

        // 2. Tải dữ liệu từ Firebase
        async function loadData() {
            try {
                const q = query(collection(db, "literary_news"), orderBy("createdAt", "desc"));
                const snapshot = await getDocs(q);
                
                allArticles = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return {
                        id: doc.id,
                        slug: data.slug || null,
                        title: data.title || "Chưa có tiêu đề",
                        category: data.type || "diahat", 
                        summary: data.summary || (data.intro ? data.intro.replace(/<[^>]*>?/gm, '').slice(0, 150) + "..." : ""),
                        img: data.img || "../panel.webp", 
                        date: data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString('vi-VN') : 'Mới cập nhật'
                    };
                });

                renderLayout(allArticles);
            } catch (e) {
                console.error(e);
                document.getElementById('content-area').innerHTML = `<div class="loading-state text-red-400">Lỗi tải dữ liệu. Hãy tải lại trang.</div>`;
            }
        }

        // 3. Hiển thị Giao diện
        function renderLayout(articles) {
            const container = document.getElementById('content-area');
            if (isFavMode && articles.length > 0) {
                // Đã được xử lý header riêng ở toggleFavorites
            } else {
                container.innerHTML = '';
            }

            if (articles.length === 0 && !isFavMode) {
                container.innerHTML = '<div class="loading-state">Chưa có bài viết nào.</div>';
                return;
            }

            let featured = null;
            let list = [...articles];

            if (currentFilter === 'all' && !isFavMode && list.length > 0) {
                featured = list.shift(); 
            }

            let html = '';
            const view2Categories = ['maicau', 'cuango', 'khoinguon'];

            if (featured) {
                const cat = getCatInfo(featured.category);
                const targetView = view2Categories.includes(featured.category) ? 'view2.html' : 'view.html';
                const link = `../bantinvanhoc/${targetView}?${featured.slug ? `slug=${featured.slug}` : `id=${featured.id}`}`;

                html += `
                    <a href="${link}" class="featured-card card">  
                        <div class="c-img-box f-img-wrap">
                            <img src="${featured.img}" class="c-img f-img" loading="lazy">
                            <div class="c-badge" style="background:var(--primary); color:white; border:none;">MỚI NHẤT</div>
                        </div>
                        <div class="c-body f-content">
                            <div class="c-badge" style="position:static; width:fit-content; margin-bottom:10px; background:rgba(255,143,80,0.1); color:#FF8F50;">${cat.name}</div>
                            <h2 class="c-title f-title">${featured.title}</h2>
                            <p class="c-desc f-desc">${featured.summary}</p>
                            <div class="c-footer">
                                <span>${featured.date}</span>
                                <span class="read-link">Đọc ngay <i class="fas fa-arrow-right"></i></span>
                            </div>
                        </div>
                    </a>`;
            }

            html += '<div class="news-grid">';
            list.forEach(item => {
                const cat = getCatInfo(item.category);
                const targetView = view2Categories.includes(item.category) ? 'view2.html' : 'view.html';
                const link = `../bantinvanhoc/${targetView}?${item.slug ? `slug=${item.slug}` : `id=${item.id}`}`;

                html += `
                <a href="${link}" class="card">
                    <div class="c-img-box">
                        <img src="${item.img}" class="c-img" loading="lazy">
                        <div class="c-badge">${cat.name}</div>
                    </div>
                    <div class="c-body">
                        <h3 class="c-title">${item.title}</h3>
                        <p class="c-desc">${item.summary}</p>
                        <div class="c-footer">
                            <span>${item.date}</span>
                            <span class="read-link">Xem <i class="fas fa-chevron-right"></i></span>
                        </div>
                    </div>
                </a>`;
            });
            html += '</div>';

            if(isFavMode) {
                container.insertAdjacentHTML('beforeend', html);
            } else {
                container.innerHTML = html;
            }
        }

        // 4. Lọc và Yêu Thích
        window.filterData = (cat, el) => {
            currentFilter = cat;
            isFavMode = false;
            document.getElementById('btn-love-mode').classList.remove('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(el) el.classList.add('active');
            const filtered = cat === 'all' ? allArticles : allArticles.filter(i => i.category === cat);
            renderLayout(filtered);
        };

        window.toggleFavorites = async () => {
            if (!auth.currentUser) return alert("Vui lòng đăng nhập!");
            isFavMode = !isFavMode;
            const btn = document.getElementById('btn-love-mode');
            const container = document.getElementById('content-area');
            
            btn.classList.toggle('active', isFavMode);

            if (isFavMode) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); 
                container.innerHTML = `<div class="loading-state"><i class="fas fa-spinner fa-spin text-3xl mb-3 text-orange-400"></i><br>Đang tìm trong bộ sưu tập...</div>`;
                
                try {
                    const favSnap = await getDoc(doc(db, "favorites", auth.currentUser.uid));
                    if (!favSnap.exists() || !favSnap.data().list || favSnap.data().list.length === 0) {
                        container.innerHTML = `
                            <div class="text-center py-10">
                                <i class="far fa-folder-open text-6xl text-gray-300 dark:text-slate-600 mb-4"></i>
                                <h3 class="text-xl font-bold text-gray-500 dark:text-slate-400">Chưa có bài viết nào</h3>
                                <p class="text-sm text-gray-400 dark:text-slate-500 mt-2">Hãy thả tim các bài viết hay để lưu vào đây nhé!</p>
                            </div>`;
                        return;
                    }

                    favIdsCache = favSnap.data().list;
                    const favArticles = allArticles.filter(a => favIdsCache.includes(a.id));
                    
                    container.innerHTML = `
                        <div class="col-span-full mb-6 pb-4 border-b border-gray-200 dark:border-slate-700 flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-red-100 dark:bg-red-900/30 text-red-500 flex items-center justify-center font-bold"><i class="fas fa-heart"></i></div>
                            <span class="font-bold text-gray-600 dark:text-slate-300">Bạn đã lưu ${favArticles.length} bài viết</span>
                        </div>`;
                    
                    renderLayout(favArticles);
                } catch (e) {
                    console.error(e);
                    container.innerHTML = '<div class="loading-state text-red-400">Lỗi tải dữ liệu.</div>';
                }
            } else {
                const btnAll = document.querySelector('.nav-btn:first-child');
                if(btnAll) btnAll.click(); 
            }
        };

        // 5. Tính năng phụ
        document.getElementById('search-input').addEventListener('input', (e) => {
            const key = e.target.value.toLowerCase();
            const sourceList = isFavMode ? allArticles.filter(a => favIdsCache.includes(a.id)) : allArticles;
            const filtered = sourceList.filter(i => i.title.toLowerCase().includes(key));
            renderLayout(filtered);
        });

        window.scrollNav = (dir) => { document.getElementById('nav-scroll-container').scrollBy({ left: 300 * dir, behavior: 'smooth' }); };
        
        window.toggleSidebar = () => {
            const sidebar = document.querySelector('aside');
            const overlay = document.getElementById('sidebar-overlay');
            if(sidebar) sidebar.classList.toggle('open');
            if(overlay) overlay.classList.toggle('hidden');
        };

        window.addEventListener('trigger-firebase-signout', async () => { await signOut(auth); window.location.href = "../index.html"; });
    </script>

<script type="text/javascript">
    // 1. Chặn Chuột phải (Để ẩn menu "Inspect/Kiểm tra" và "View Source/Xem nguồn")
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        // Không hiện thông báo gì cả để trải nghiệm mượt mà hơn
    });

    // 2. Chặn các phím tắt Developer Tools
    document.addEventListener('keydown', function(e) {
        // Chặn F12
        if (e.key === 'F12' || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }

        // Chặn các tổ hợp phím Ctrl + ...
        if (e.ctrlKey) {
            switch (e.key.toLowerCase()) {
                case 'u': // Chặn Ctrl + U (Xem source code)
                case 's': // Chặn Ctrl + S (Lưu trang web)
                case 'p': // Chặn Ctrl + P (In trang web - thường hiện code)
                // Lưu ý: KHÔNG chặn 'c' (Copy) và 'a' (Select All)
                    e.preventDefault();
                    return false;
            }

            // Chặn Ctrl + Shift + ... (Các phím mở DevTools)
            if (e.shiftKey) {
                switch (e.key.toLowerCase()) {
                    case 'i': // Inspect Element
                    case 'j': // Console
                    case 'c': // Element Inspector
                        e.preventDefault();
                        return false;
                }
            }
        }
    });
</script>
</body>
</html>
