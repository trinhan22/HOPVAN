<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HopVan - Cộng Đồng</title>
    <meta property="og:title" content="HOPVAN - Nền Tảng Học & Luyện Thi Ngữ Văn" />
    <meta property="og:description" content="Nền tảng học tập Ngữ Văn tích hợp AI – hỗ trợ tự học thông minh, phân tích tác phẩm, luyện viết hiệu quả." />
    <meta property="og:image" content="https://hopvan.info.vn/panel.webp" />
    <meta property="og:url" content="https://hopvan.info.vn" />
    <meta property="og:type" content="article" />
    <link rel="icon" href="https://hopvan.info.vn/LOGO.WEBP" />
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        /* --- CORE STYLES & VARIABLES --- */
        :root {
            --primary: #FF8F50;
            --primary-gradient: linear-gradient(135deg, #FF8F50, #FF5E62);
            --discord-color: #5865F2;
            --discord-gradient: linear-gradient(135deg, #5865F2, #4752C4);
            
            /* BỘ MÀU LIGHT MODE */
            --bg-body: #FFF5EC;
            --bg-glass: rgba(255, 255, 255, 0.6);
            --bg-panel: rgba(255, 255, 255, 0.85);
            --bg-panel-hover: white;
            --border-panel: white;
            --text-heading: #2D3436; 
            --text-sub: #636E72;     
            --blur: 25px;
            --sidebar-width: 260px;
        }

        /* BỘ MÀU DARK MODE */
        html.dark {
            --bg-body: #0f172a;       /* slate-900 */
            --bg-glass: rgba(15, 23, 42, 0.7);
            --bg-panel: rgba(30, 41, 59, 0.85); /* slate-800 */
            --bg-panel-hover: #1e293b;
            --border-panel: #334155;  /* slate-700 */
            --text-heading: #f8fafc;  /* slate-50 */
            --text-sub: #94a3b8;      /* slate-400 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease; }
        body { background-color: var(--bg-body); height: 100vh; overflow: hidden; display: flex; color: var(--text-heading); }

        /* --- BACKGROUND --- */
        .background-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: floatBlob 10s infinite alternate; }
        .blob-1 { width: 500px; height: 500px; background: #FCA96A; top: -100px; left: -100px; }
        .blob-2 { width: 400px; height: 400px; background: #FCD5B5; bottom: -50px; right: -50px; animation-delay: -5s; }
        .blob-3 { width: 300px; height: 300px; background: #FFD1D1; top: 40%; left: 40%; animation-delay: -2s; }
        html.dark .blob { opacity: 0.2; }
        @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }

        /* --- MOBILE HEADER & OVERLAY --- */
        .mobile-header {
            display: none; position: fixed; top: 0; left: 0; right: 0;
            height: 60px; background: var(--bg-panel); z-index: 100;
            align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border-panel);
        }
        #sidebar-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            z-index: 998; transition: 0.3s; opacity: 0;
        }
        #sidebar-overlay.active { display: block; opacity: 1; }

        .dashboard-container { width: 100%; height: 100%; position: relative; }

        .main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            height: 100%;
            background: var(--bg-glass); backdrop-filter: blur(var(--blur));
            border-left: 1px solid var(--border-panel); padding: 40px 50px;
            overflow-y: auto; display: flex; flex-direction: column; position: relative;
            -webkit-overflow-scrolling: touch;
        }

        /* --- GIỚI HẠN CHIỀU RỘNG NỘI DUNG ĐỂ KHÔNG BỊ THÒI THỤT --- */
        .content-wrapper {
            width: 100%;
            max-width: 1100px; /* GIỚI HẠN CHIỀU RỘNG CHUẨN ĐỂ KHÔNG BỊ BÈ RA */
            margin: 0 auto;    /* CANH GIỮA MÀN HÌNH */
        }


        /* --- ĐỒNG BỘ DARK MODE CHO MENU.JS --- */
        html.dark #menu-placeholder aside, 
        html.dark #menu-placeholder .sidebar {
            background-color: var(--bg-panel) !important;
            border-color: var(--border-panel) !important;
        }

        /* Ép trong suốt mọi thẻ div bọc ngoài có nền sáng để lộ nền tối của Sidebar */
        html.dark #menu-placeholder aside > div,
        html.dark #menu-placeholder .sidebar > div {
            background-color: transparent !important;
            border-color: var(--border-panel) !important;
        }

        html.dark #menu-placeholder button {
            background-color: var(--bg-body) !important; 
            border: 1px solid var(--border-panel) !important;
            color: var(--text-sub) !important;
            box-shadow: none !important;
        }
        html.dark #menu-placeholder button:hover {
            background-color: var(--bg-panel-hover) !important;
            border-color: var(--primary) !important;
            color: var(--primary) !important;
        }
        html.dark #menu-placeholder .nav-item.active { 
            background: var(--primary-gradient) !important; 
            color: white !important; 
            border-color: transparent !important; 
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4) !important;
        }
        html.dark #menu-placeholder div[style*="background-color"] {
            background-color: var(--bg-body) !important;
            border-color: var(--border-panel) !important;
        }
        html.dark #menu-placeholder [class*="border-"] { border-color: var(--border-panel) !important; }
        html.dark #menu-placeholder .text-gray-800, 
        html.dark #menu-placeholder h1 { color: var(--text-heading) !important; }
        html.dark #menu-placeholder .text-gray-500, 
        html.dark #menu-placeholder .text-gray-400 { color: var(--text-sub) !important; }
        html.dark #menu-placeholder .nav-item { color: var(--text-sub) !important; transition: 0.3s; }
        html.dark #menu-placeholder .nav-item:hover { background-color: rgba(255, 143, 80, 0.1) !important; color: var(--primary) !important; }

        /* --- DISCORD CARD --- */
        .community-center { 
            flex: 1; display: flex; justify-content: center; align-items: center; padding-bottom: 30px;
        }

        .discord-card-pro {
            width: 100%; max-width: 900px;
            background: var(--bg-panel);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-panel);
            border-radius: 40px;
            padding: 50px 60px;
            display: flex; align-items: center; gap: 50px;
            box-shadow: 0 20px 60px rgba(88, 101, 242, 0.12);
            position: relative; overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, background 0.4s ease;
        }
        html.dark .discord-card-pro { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); }

        .discord-card-pro:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 70px rgba(88, 101, 242, 0.2);
            background: var(--bg-panel-hover);
        }
        html.dark .discord-card-pro:hover { box-shadow: 0 30px 70px rgba(88, 101, 242, 0.15); }

        /* Ánh sáng mờ ảo bên trong Card */
        .dc-glow { position: absolute; border-radius: 50%; filter: blur(60px); z-index: 0; pointer-events: none; }
        .blob-top { width: 300px; height: 300px; background: rgba(88, 101, 242, 0.15); top: -100px; left: -100px; animation: pulseGlow 6s infinite alternate; }
        .blob-bottom { width: 400px; height: 400px; background: rgba(255, 143, 80, 0.1); bottom: -150px; right: -150px; animation: pulseGlow 8s infinite alternate-reverse; }
        @keyframes pulseGlow { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.2); opacity: 1; } }

        .dc-logo-side {
            width: 120px; height: 120px; background: var(--discord-gradient);
            border-radius: 35px; display: flex; justify-content: center; align-items: center;
            font-size: 4.5rem; color: white; flex-shrink: 0;
            box-shadow: 0 15px 35px rgba(88, 101, 242, 0.3);
            animation: breathe 3s ease-in-out infinite;
            position: relative; z-index: 2; transform: translateZ(40px);
        }
        @keyframes breathe { 0%, 100% { transform: scale(1) translateZ(40px); } 50% { transform: scale(1.05) translateZ(40px); } }

        .dc-watermark {
            position: absolute; right: -40px; top: -30px; font-size: 28rem;
            color: #5865F2; opacity: 0.03; z-index: 0; transform: rotate(-15deg);
            pointer-events: none; transition: 0.5s ease;
        }
        html.dark .dc-watermark { opacity: 0.05; }
        .discord-card-pro:hover .dc-watermark { transform: rotate(0) scale(1.05); opacity: 0.05; }
        html.dark .discord-card-pro:hover .dc-watermark { opacity: 0.08; }
        
        .dc-left { position: relative; z-index: 2; flex-shrink: 0; }
        .dc-icon-wrapper {
            width: 150px; height: 150px;
            background: var(--discord-gradient);
            border-radius: 40px;
            display: flex; justify-content: center; align-items: center;
            font-size: 6rem; color: white;
            box-shadow: 0 20px 40px rgba(88, 101, 242, 0.4), inset 0 5px 15px rgba(255,255,255,0.3);
            animation: floatLogo 4s ease-in-out infinite;
            border: 4px solid var(--bg-glass);
        }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* Nội dung bên phải */
        .dc-right { position: relative; z-index: 2; flex: 1; }

        .dc-badge {
            display: inline-flex; padding: 6px 16px; background: rgba(88, 101, 242, 0.1); color: var(--discord-color);
            font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(88, 101, 242, 0.2);
            align-items: center; gap: 6px;
        }

        .dc-title { font-size: 2.2rem; font-weight: 900; color: var(--text-heading); margin-bottom: 12px; letter-spacing: -1px; line-height: 1.2; }

        .dc-features { list-style: none; margin-bottom: 30px; display: flex; flex-direction: column; gap: 10px; }
        .dc-features li { display: flex; align-items: center; gap: 12px; font-weight: 700; color: var(--text-sub); font-size: 0.95rem; }
        .dc-features i { color: var(--discord-color); font-size: 1.2rem; }

        .dc-desc { font-size: 1.05rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 20px; font-weight: 500; }

        .btn-join-discord-pro {
            background: var(--discord-color); color: white; padding: 16px 35px;
            border-radius: 20px; font-weight: 800; font-size: 1.1rem;
            display: inline-flex; align-items: center; gap: 12px; border: none; cursor: pointer;
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.4); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .btn-join-discord-pro::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-25deg); transition: 0s;
        }

        .btn-join-discord-pro:hover { transform: translateY(-3px) scale(1.02); background: #4752C4; box-shadow: 0 15px 35px rgba(88, 101, 242, 0.5); }
        .btn-join-discord-pro:hover::before { left: 200%; transition: 0.6s ease; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            .mobile-header { display: flex; z-index: 1000; }
            #menu-placeholder aside {
                position: fixed !important; left: 0 !important; top: 0 !important; bottom: 0 !important;
                transform: translateX(-100%); z-index: 9999 !important; width: 280px !important; 
                transition: transform 0.3s ease-in-out !important;
            }
            #menu-placeholder aside.open { transform: translateX(0) !important; box-shadow: 10px 0 50px rgba(0,0,0,0.5) !important; }

            .main-content { margin-left: 0 !important; width: 100% !important; padding: 80px 20px 30px !important; }
            
            .discord-card-pro { flex-direction: column; padding: 40px 25px; text-align: center; gap: 30px; }
            .dc-icon-wrapper { width: 110px; height: 110px; font-size: 4.5rem; margin: 0 auto; animation: none; transform: translateY(-10px);}
            .dc-title { font-size: 1.7rem; }
            .dc-features { align-items: center; }
            .dc-features li { justify-content: center; }
            .btn-join-discord-pro { width: 100%; justify-content: center; }
            .dc-watermark { display: none; }
        }

        /* --- GLOBAL SCROLLBAR STYLE --- */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255, 143, 80, 0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background-color: rgba(255, 143, 80, 0.3); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; transition: background-color 0.3s ease; }
        ::-webkit-scrollbar-thumb:hover { background-color: #FF8F50; border: 1px solid transparent; }
        ::-webkit-scrollbar-button { display: none; }
    </style>
</head>
<body>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="mobile-header lg:hidden">
        <button onclick="toggleSidebar()" class="text-orange-500 text-2xl mr-4 focus:outline-none">
            <i class="fas fa-bars"></i>
        </button>
        <div class="flex items-center gap-2">
            <img src="../LOGO.WEBP" alt="Logo" class="w-8 h-8">
            <span class="font-black text-orange-500 text-lg">HOPVAN</span>
        </div>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="dashboard-container">
        <div id="menu-placeholder"></div>

        <main class="main-content">
            <div class="content-wrapper">
                
                <div id="hopvan-header-container"></div>

                <div class="community-center">
                    <div class="discord-card-pro">
                        <div class="dc-glow blob-top"></div>
                        <div class="dc-glow blob-bottom"></div>
                        <i class="fab fa-discord dc-watermark"></i>

                        <div class="dc-left">
                            <div class="dc-icon-wrapper">
                                <i class="fab fa-discord"></i>
                            </div>
                        </div>

                        <div class="dc-right">
                            <div class="dc-badge"><i class="fas fa-fire"></i> Cộng đồng #1</div>
                            <h1 class="dc-title">Gia nhập Server HopVan</h1>
                            <p class="dc-desc">Nơi hội tụ của các sĩ tử HopVan, cùng nhau bứt phá điểm số môn Ngữ Văn với vô vàn đặc quyền:</p>
                            
                            <ul class="dc-features">
                                <li><i class="fas fa-check-circle"></i> Trao đổi tài liệu thi cử, miễn phí, chất lượng</li>
                                <li><i class="fas fa-check-circle"></i> Livestream chữa đề & thực chiến mỗi tuần</li>
                                <li><i class="fas fa-check-circle"></i> Giải đáp thắc mắc 24/7 từ các Mentor</li>
                            </ul>

                            <button id="btn-discord-action" class="btn-join-discord-pro">
                                <i class="fab fa-discord"></i> Tham gia Discord ngay
                            </button>
                        </div>
                    </div>
                </div>
                
            </div>
        </main>
    </div>

    <script type="module" src="gam.js"></script>
    <script src="../chatbot.js"></script>
    <script type="module" src="/check-maintenance.js"></script>
    <script>
        // --- LOGIC SIDEBAR TOGGLE ---
        window.toggleSidebar = () => {
            const sidebar = document.querySelector('#menu-placeholder aside');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (sidebar && overlay) {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
                
                if (sidebar.classList.contains('open')) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = 'auto';
                }
            }
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { initMenu } from "./menu.js";
        import { initHeader } from './header.js'; 
        
        // Kích hoạt Header
        initHeader('hopvan-header-container');
        
        // 1. CẤU HÌNH FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyAJ9C2biYeiLPmhakzLZ4mEqfO9_VgPSZE", 
            authDomain: "hopvan-9a648.firebaseapp.com", 
            projectId: "hopvan-9a648", 
            storageBucket: "hopvan-9a648.appspot.com", 
            messagingSenderId: "429347196227", 
            appId: "1:429347196227:web:917b8d019f0efd0f7833f6", 
            measurementId: "G-1BG8PSRG0R" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Khởi tạo Menu (Active tab: community)
        initMenu(app, 'community');

        // 3. KIỂM TRA ĐĂNG NHẬP VÀ ĐỒNG BỘ THEME (Rút gọn)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists() && userDoc.data().theme === 'dark') {
                        document.documentElement.classList.add('dark');
                    }
                } catch (error) {
                    console.error("Lỗi đồng bộ theme:", error);
                }
            } else {
                window.location.href = "../log.html";
            }
        });

        // 4. XỬ LÝ LỆNH ĐĂNG XUẤT (KHỚP VỚI MENU.HTML)
        window.addEventListener('trigger-firebase-signout', async () => {
            try {
                await signOut(auth);
                window.location.href = "../index.html"; 
            } catch (error) {
                alert("Lỗi khi thoát: " + error.message);
            }
        });

        // 5. GIA NHẬP DISCORD (LƯU DATABASE)
        const discordBtn = document.getElementById('btn-discord-action');
        if(discordBtn) {
            discordBtn.addEventListener('click', async () => {
                const user = auth.currentUser;
                if (user) {
                    try {
                        await addDoc(collection(db, "activities"), {
                            uid: user.uid,
                            action: "Gia nhập Cộng đồng Discord",
                            timestamp: serverTimestamp()
                        });
                    } catch (e) { console.error("Lưu DB lỗi nhưng vẫn mở link:", e); }
                }
                window.open("https://discord.gg/EhsQyEAk2k", "_blank");
            });
        }
    </script>

    <script type="text/javascript">
    // 1. Chặn Chuột phải 
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

    // 2. Chặn các phím tắt Developer Tools
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey) {
            switch (e.key.toLowerCase()) {
                case 'u': case 's': case 'p': 
                    e.preventDefault();
                    return false;
            }
            if (e.shiftKey) {
                switch (e.key.toLowerCase()) {
                    case 'i': case 'j': case 'c': 
                        e.preventDefault();
                        return false;
                }
            }
        }
    });
</script>
</body>
</html>
