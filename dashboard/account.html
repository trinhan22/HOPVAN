<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HopVan - Quản Lý Tài Khoản</title>
    <meta property="og:title" content="HOPVAN - Nền Tảng Học & Luyện Thi Ngữ Văn" />
    <meta property="og:description" content="Nền tảng học tập Ngữ Văn tích hợp AI – hỗ trợ tự học thông minh, phân tích tác phẩm, luyện viết hiệu quả." />
    <meta property="og:image" content="https://hopvan.netlify.app/panel.webp" />
    <meta property="og:url" content="https://hopvan.netlify.app" />
    <meta property="og:type" content="article" />
    <link rel="icon" type="image/webp" href="../LOGO.WEBP" />
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <style>
        :root {
            --primary: #FF8F50;
            --primary-gradient: linear-gradient(135deg, #FF8F50, #FF5E62);
            /* BỘ MÀU LIGHT MODE (MẶC ĐỊNH) */
            --bg-body: #FFF5EC;
            --bg-glass: rgba(255, 255, 255, 0.6);
            --bg-panel: rgba(255, 255, 255, 0.85);
            --bg-panel-hover: white;
            --border-panel: white;
            --text-heading: #1f2937; /* gray-800 */
            --text-sub: #6b7280;     /* gray-500 */
            --bg-input: #f9fafb;
            --border-input: #e5e7eb;
            --blur: 25px;
            --sidebar-width: 260px;
        }

        /* BỘ MÀU DARK MODE */
        html.dark {
            --bg-body: #0f172a;       /* slate-900 */
            --bg-glass: rgba(15, 23, 42, 0.7);
            --bg-panel: rgba(30, 41, 59, 0.85); /* slate-800 */
            --bg-panel-hover: #1e293b;
            --border-panel: #334155;  /* slate-700 */
            --text-heading: #f8fafc;  /* slate-50 */
            --text-sub: #94a3b8;      /* slate-400 */
            --bg-input: #0f172a;
            --border-input: #475569;  /* slate-600 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease; }
        body { background-color: var(--bg-body); height: 100vh; overflow: hidden; display: flex; color: var(--text-heading); }

        /* --- BACKGROUND --- */
        .background-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: floatBlob 10s infinite alternate; }
        .blob-1 { width: 500px; height: 500px; background: #FCA96A; top: -100px; left: -100px; }
        .blob-2 { width: 400px; height: 400px; background: #FCD5B5; bottom: -50px; right: -50px; animation-delay: -5s; }
        .blob-3 { width: 300px; height: 300px; background: #FFD1D1; top: 40%; left: 40%; animation-delay: -2s; }
        html.dark .blob { opacity: 0.2; }
        @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }

        /* --- LAYOUT --- */
        .main-content { 
            flex: 1; margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width));
            background: var(--bg-glass); backdrop-filter: blur(var(--blur)); 
            padding: 30px 40px; overflow-y: auto; position: relative; 
        }

        /* --- ĐỒNG BỘ DARK MODE CHO MENU.JS --- */
        #menu-placeholder aside {
            background-color: var(--bg-panel) !important;
            border-color: var(--border-panel) !important;
        }

        /* 1. ÉP TRONG SUỐT mọi thẻ div bọc ngoài có nền sáng (xám/trắng) để lộ nền tối của Sidebar */
        #menu-placeholder aside div[class*="bg-gray-"],
        #menu-placeholder aside div[class*="bg-slate-"],
        #menu-placeholder aside div[class*="bg-white"] {
            background-color: transparent !important;
        }

        /* --- ĐỒNG BỘ DARK MODE CHO MENU.JS --- */
        /* Lấy chuẩn 100% logic từ Bản Tin Văn Học, đổi biến cho khớp với Cộng Đồng */
        
        html.dark #menu-placeholder aside, 
        html.dark #menu-placeholder .sidebar {
            background-color: var(--bg-panel) !important;
            border-color: var(--border-panel) !important;
        }

        /* 1. Ép trong suốt mọi thẻ div bọc ngoài có nền sáng để lộ nền tối của Sidebar */
        html.dark #menu-placeholder aside > div,
        html.dark #menu-placeholder .sidebar > div {
            background-color: transparent !important;
            border-color: var(--border-panel) !important;
        }

        /* 2. Ép màu nền tối cho các Nút (Góp ý, Thoát,...) ở đáy menu */
        html.dark #menu-placeholder button {
            background-color: var(--bg-body) !important; 
            border: 1px solid var(--border-panel) !important;
            color: var(--text-sub) !important;
            box-shadow: none !important;
        }
        html.dark #menu-placeholder button:hover {
            background-color: var(--bg-panel-hover) !important;
            border-color: var(--primary) !important;
            color: var(--primary) !important;
        }

        /* 3. Nút đang Active */
        html.dark #menu-placeholder .nav-item.active { 
            background: var(--primary-gradient) !important; 
            color: white !important; 
            border-color: transparent !important; 
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4) !important;
        }

        /* 4. Ép màu cục Version (HopVan Platform) đang dùng style inline */
        html.dark #menu-placeholder div[style*="background-color"] {
            background-color: var(--bg-body) !important;
            border-color: var(--border-panel) !important;
        }

        /* 5. Xử lý Viền và Chữ */
        html.dark #menu-placeholder [class*="border-"] { border-color: var(--border-panel) !important; }
        html.dark #menu-placeholder .text-gray-800, 
        html.dark #menu-placeholder h1 { color: var(--text-heading) !important; }
        html.dark #menu-placeholder .text-gray-500, 
        html.dark #menu-placeholder .text-gray-400 { color: var(--text-sub) !important; }
        
        /* 6. Hiệu ứng hover của Nav Item */
        html.dark #menu-placeholder .nav-item { color: var(--text-sub) !important; transition: 0.3s; }
        html.dark #menu-placeholder .nav-item:hover { background-color: rgba(255, 143, 80, 0.1) !important; color: var(--primary) !important; }

        /* --- COMPONENTS --- */
        .glass-panel {
            background: var(--bg-panel); backdrop-filter: blur(12px);
            border: 1px solid var(--border-panel); border-radius: 24px; padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03); height: 100%;
            position: relative; overflow: hidden; 
        }
        .glass-panel:hover {
            transform: translateY(-5px); 
            background: var(--bg-panel-hover);
            box-shadow: 0 20px 40px rgba(255, 143, 80, 0.12); 
            border-color: var(--primary);
        }
        
        .text-gray-800 { color: var(--text-heading) !important; }
        .text-gray-500 { color: var(--text-sub) !important; }

        .glass-panel > div, .glass-panel > form { position: relative; z-index: 2; }

        .panel-watermark {
            position: absolute; right: -20px; bottom: -20px; font-size: 10rem; 
            opacity: 0.1; transform: rotate(-15deg); transition: 0.5s; 
            z-index: 0; pointer-events: none;
        }
        html.dark .panel-watermark { opacity: 0.05; }
        .glass-panel:hover .panel-watermark { transform: rotate(0deg) scale(1.1); opacity: 0.2; }

        .glass-input {
            width: 100%; padding: 12px 16px; background: var(--bg-input); border: 1px solid var(--border-input);
            border-radius: 12px; font-size: 0.95rem; color: var(--text-heading); outline: none;
        }
        .glass-input:focus { background: var(--bg-panel-hover); border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255, 143, 80, 0.15); }
        .glass-input:disabled { background: var(--border-input); color: var(--text-sub); cursor: not-allowed; opacity: 0.7;}

        .btn-primary {
            background: var(--primary-gradient); color: white; padding: 12px 24px; border-radius: 12px; font-weight: 700;
            border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 94, 98, 0.3);
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 94, 98, 0.4); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* --- TOGGLE THEME BUTTON --- */
        .theme-toggle-wrapper {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: var(--bg-input); border-radius: 16px;
            border: 1px solid var(--border-input); margin-bottom: 20px;
        }
        .toggle-switch {
            position: relative; width: 50px; height: 26px; background: #cbd5e1;
            border-radius: 30px; cursor: pointer; transition: 0.3s;
        }
        .toggle-switch::after {
            content: ''; position: absolute; top: 3px; left: 3px;
            width: 20px; height: 20px; background: white; border-radius: 50%;
            transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        html.dark .toggle-switch { background: var(--primary); }
        html.dark .toggle-switch::after { transform: translateX(24px); }

        /* --- AVATAR STYLES --- */
        .avatar-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto 10px; }
        .avatar-circle {
            width: 100%; height: 100%; background: var(--primary-gradient); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 2.5rem; font-weight: 800;
            box-shadow: 0 10px 30px rgba(255, 143, 80, 0.3); border: 4px solid var(--bg-panel); overflow: hidden;
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-edit-btn {
            position: absolute; bottom: 0; right: 0; width: 32px; height: 32px;
            background: var(--bg-panel-hover); border: 1px solid var(--border-input); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: var(--text-sub); cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: all 0.2s;
        }
        .avatar-edit-btn:hover { background: #FF8F50; color: white; transform: scale(1.1); border-color: #FF8F50;}

        /* --- TOAST NOTIFICATION --- */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; }
        .toast {
            background: var(--bg-panel); backdrop-filter: blur(10px); padding: 16px 20px; border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 15px;
            transform: translateX(120%); opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--border-panel); min-width: 320px; position: relative; overflow: hidden;
        }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast-icon { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
        .toast.success .toast-icon { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .toast-content { flex: 1; }
        .toast-title { font-weight: 800; font-size: 0.9rem; color: var(--text-heading); }
        .toast-msg { font-size: 0.8rem; color: var(--text-sub); font-weight: 500; }

        /* --- CUSTOM MODAL POPUP --- */
        .custom-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            z-index: 10000; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .custom-modal-overlay.open { display: flex; opacity: 1; }
        .custom-modal-box {
            background: var(--bg-panel); padding: 35px; border-radius: 28px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 30px 60px -10px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.3s;
            border: 1px solid var(--border-panel);
        }
        .custom-modal-overlay.open .custom-modal-box { transform: scale(1); }
        .modal-icon { width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .modal-icon.danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .modal-icon.info { background: rgba(2, 132, 199, 0.2); color: #0ea5e9; }
        .modal-btn-group { display: flex; gap: 12px; margin-top: 25px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 14px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; }
        .btn-cancel { background: var(--bg-input); color: var(--text-sub); border: 1px solid var(--border-input);}
        .btn-cancel:hover { filter: brightness(0.9); }
        .btn-confirm-danger { background: #dc2626; color: white; box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3); }
        .btn-confirm-danger:hover { background: #b91c1c; }

        /* Mobile */
        @media (max-width: 768px) {
            #menu-placeholder aside { display: none; } 
            .main-content { margin-left: 0; width: 100%; padding: 80px 20px 30px; }
            .grid-layout { grid-template-columns: 1fr !important; }
        }

        /* --- GLOBAL SCROLLBAR STYLE --- */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255, 143, 80, 0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background-color: rgba(255, 143, 80, 0.3); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; transition: background-color 0.3s ease; }
        ::-webkit-scrollbar-thumb:hover { background-color: #FF8F50; border: 1px solid transparent; }
        ::-webkit-scrollbar-button { display: none; }
    </style>
</head>
<body>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div id="menu-placeholder"></div>

    <main class="main-content">
        <div id="toast-container"></div>

        <div id="custom-modal" class="custom-modal-overlay">
            <div class="custom-modal-box">
                <div id="modal-icon-container" class="modal-icon danger">
                    <i id="modal-icon-class" class="fas fa-exclamation-triangle"></i>
                </div>
                <h3 id="modal-title" class="text-xl font-black text-gray-800 mb-2">Thông báo</h3>
                <p id="modal-message" class="text-sm text-gray-500 leading-relaxed">Nội dung thông báo...</p>
                <div class="modal-btn-group">
                    <button class="modal-btn btn-cancel" onclick="closeModal()">Hủy</button>
                    <button id="modal-confirm-btn" class="modal-btn btn-confirm-danger">Xác nhận</button>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-black text-gray-800">Quản lý tài khoản</h1>
                <p class="text-gray-500 text-sm mt-1">Cập nhật thông tin và giao diện hiển thị.</p>
            </div>
            <button onclick="document.querySelector('#menu-placeholder aside').style.display='flex'" class="md:hidden w-10 h-10 rounded-full flex items-center justify-center shadow-sm text-gray-500 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 grid-layout" style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px;">
            
            <div class="glass-panel">
                <i class="fas fa-id-card panel-watermark text-orange-400"></i>
                
                <div class="text-center mb-8">
                    <div class="avatar-wrapper">
                        <div class="avatar-circle" id="user-avatar-display"></div>
                        <button onclick="document.getElementById('avatar-input').click()" class="avatar-edit-btn" title="Đổi ảnh đại diện">
                            <i class="fas fa-camera"></i>
                        </button>
                        <input type="file" id="avatar-input" hidden accept="image/*">
                    </div>
                    
                    <h2 class="font-bold text-lg text-gray-800" id="display-name-header">Đang tải...</h2>
                    <p class="text-xs font-bold uppercase tracking-wider mt-1" id="user-role-display">Đang tải</p>
                </div>

                <form id="profile-form" class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Họ và tên</label>
                            <input id="profile-name" type="text" class="glass-input" required placeholder="Nhập tên của bạn">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Email</label>
                            <input id="profile-email" type="email" class="glass-input" disabled value="loading...">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Trường học</label>
                            <input id="profile-school" type="text" class="glass-input" placeholder="VD: THPT FPT Cần Thơ">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Khối lớp</label>
                            <select id="profile-grade" class="glass-input cursor-pointer">
                                <option value="10" class="dark:bg-slate-800">Lớp 10</option>
                                <option value="11" class="dark:bg-slate-800">Lớp 11</option>
                                <option value="12" class="dark:bg-slate-800">Lớp 12</option>
                            </select>
                        </div>
                    </div>
                    <div class="pt-2 text-right">
                        <button type="submit" class="btn-primary w-full md:w-auto">
                            <i class="fas fa-save"></i> Lưu thông tin
                        </button>
                    </div>
                </form>
            </div>

            <div class="space-y-8">
                <div class="glass-panel h-auto" style="padding-bottom: 20px;">
                    <i class="fas fa-paint-brush panel-watermark text-blue-400"></i>
                    <h3 class="font-black text-gray-800 text-lg mb-6 flex items-center gap-2">
                        <i class="fas fa-moon text-blue-500"></i> Giao diện
                    </h3>
                    
                    <div class="theme-toggle-wrapper" onclick="toggleDarkModeLogic()">
                        <div>
                            <p class="font-bold text-sm text-gray-800">Chế độ ban đêm</p>
                            <p class="text-[10px] text-gray-500 mt-1">Giảm chói mắt khi học buổi tối</p>
                        </div>
                        <div class="toggle-switch" id="theme-switch"></div>
                    </div>
                </div>

                <div class="glass-panel h-auto">
                    <i class="fas fa-user-shield panel-watermark text-red-400"></i>
                    <h3 class="font-black text-gray-800 text-lg mb-6 flex items-center gap-2">
                        <i class="fas fa-shield-alt text-red-500"></i> Bảo mật
                    </h3>
                    <form id="password-form" class="space-y-5">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Mật khẩu mới</label>
                            <input id="new-password" type="password" class="glass-input" required placeholder="••••••••">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Xác nhận mật khẩu</label>
                            <input id="confirm-password" type="password" class="glass-input" required placeholder="••••••••">
                        </div>
                        <div class="pt-4">
                            <button type="submit" class="btn-primary w-full bg-gray-800 hover:shadow-gray-300">
                                <i class="fas fa-key"></i> Đổi mật khẩu
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <script type="module" src="gam.js"></script>
    <script src="../chatbot.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        import { initMenu } from "./menu.js";

        const firebaseConfig = { apiKey: "AIzaSyAJ9C2biYeiLPmhakzLZ4mEqfO9_VgPSZE", authDomain: "hopvan-9a648.firebaseapp.com", projectId: "hopvan-9a648", storageBucket: "hopvan-9a648.appspot.com", messagingSenderId: "429347196227", appId: "1:429347196227:web:917b8d019f0efd0f7833f6", measurementId: "G-1BG8PSRG0R" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        initMenu(app, 'account');

        let currentUser = null;

        // --- 1. TOAST NOTIFICATION ---
        window.showToast = (title, msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            div.className = `toast ${type}`;
            const iconClass = type === 'success' ? 'fa-check' : 'fa-times';
            div.innerHTML = `<div class="toast-icon"><i class="fas ${iconClass}"></i></div><div class="toast-content"><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div>`;
            container.appendChild(div);
            setTimeout(() => div.classList.add('show'), 10);
            setTimeout(() => { div.classList.remove('show'); setTimeout(() => div.remove(), 400); }, 3500);
        }

        // --- 2. MODAL LOGIC ---
        window.openModal = (title, msg, type = 'danger', onConfirm) => {
            const modal = document.getElementById('custom-modal');
            const iconContainer = document.getElementById('modal-icon-container');
            const icon = document.getElementById('modal-icon-class');
            
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = msg;
            iconContainer.className = `modal-icon ${type}`;
            icon.className = type === 'danger' ? 'fas fa-trash-alt' : 'fas fa-info-circle';
            
            document.getElementById('modal-confirm-btn').onclick = () => { onConfirm(); window.closeModal(); };
            modal.classList.add('open');
        }
        window.closeModal = () => document.getElementById('custom-modal').classList.remove('open');

        // --- 3. XỬ LÝ THEME (DARK MODE) ---
        window.toggleDarkModeLogic = async () => {
            const html = document.documentElement;
            
            // Xác định chính xác trạng thái tiếp theo
            const isCurrentlyDark = html.classList.contains('dark');
            const newTheme = isCurrentlyDark ? 'light' : 'dark';

            // Cập nhật giao diện ngay lập tức
            if (newTheme === 'dark') {
                html.classList.add('dark');
            } else {
                html.classList.remove('dark');
            }

            // Lưu bộ nhớ trình duyệt
            localStorage.setItem('theme', newTheme);

            // Lưu lên Firebase
            if (currentUser) {
                try {
                    // ĐÃ FIX: Dùng setDoc với merge:true để đảm bảo lưu 100% thành công
                    await setDoc(doc(db, "users", currentUser.uid), { theme: newTheme }, { merge: true });
                } catch(e) { 
                    console.error("Không thể lưu theme lên cloud:", e); 
                    window.showToast("Lỗi", "Không thể đồng bộ giao diện", "error");
                }
            }
        };

        // --- 4. XỬ LÝ ẢNH ĐẠI DIỆN ---
        const compressImage = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 150; const MAX_HEIGHT = 150;
                        let width = img.width, height = img.height;

                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }

                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                };
                reader.onerror = (error) => reject(error);
            });
        };

        document.getElementById('avatar-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) return window.showToast('Lỗi', 'Ảnh quá lớn! Vui lòng chọn ảnh dưới 5MB.', 'error');

            try {
                const avatarDisplay = document.getElementById('user-avatar-display');
                avatarDisplay.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                const base64Image = await compressImage(file);
                await updateDoc(doc(db, "users", currentUser.uid), { customAvatar: base64Image });
                avatarDisplay.innerHTML = `<img src="${base64Image}" alt="User">`;
                window.showToast('Thành công', 'Đổi ảnh đại diện thành công!', 'success');
            } catch (error) {
                window.showToast('Lỗi', 'Không thể tải ảnh lên. Thử ảnh khác nhé!', 'error');
                initUserData(currentUser, await (await getDoc(doc(db, "users", currentUser.uid))).data()); 
            }
        });

        // --- 5. LOAD DỮ LIỆU VÀ KHÔNG ĐIỀU HƯỚNG ---
        async function initUserData(user, data) {
            const displayName = data.name || user.email.split('@')[0];
            
            document.getElementById('display-name-header').textContent = displayName;
            
            // ĐÃ FIX: Xử lý đồng bộ Theme chuẩn xác
            if (data.theme) {
                // Nếu Cloud có dữ liệu -> Lấy Cloud đè xuống máy tính
                localStorage.setItem('theme', data.theme);
                if (data.theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            } else {
                // Nếu Cloud bị rỗng -> Lấy từ máy tính đẩy lên Cloud
                const localTheme = localStorage.getItem('theme') || 'light';
                await setDoc(doc(db, "users", user.uid), { theme: localTheme }, { merge: true });
            }
            
            const avatarEl = document.getElementById('user-avatar-display');
            if (data.customAvatar) {
                avatarEl.innerHTML = `<img src="${data.customAvatar}" alt="User">`;
                avatarEl.style.background = 'transparent';
            } else if (user.photoURL) {
                 avatarEl.innerHTML = `<img src="${user.photoURL}" alt="User">`;
                 avatarEl.style.background = 'transparent';
            } else {
                avatarEl.innerHTML = displayName.charAt(0).toUpperCase();
                avatarEl.style.background = 'linear-gradient(135deg, #FF8F50, #FF5E62)';
            }

            document.getElementById('profile-name').value = data.name || '';
            document.getElementById('profile-email').value = user.email || '';
            document.getElementById('profile-school').value = data.school || '';
            document.getElementById('profile-grade').value = data.grade || '12';
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    const role = data.role;
                    const roleEl = document.getElementById('user-role-display');

                    // MỌI NGƯỜI ĐỀU Ở LẠI TRANG NÀY, CHỈ ĐỔI HIỂN THỊ ROLE CHO ĐẸP
                    if (role === 'admin' || user.email === 'admin@hopvan.com') {
                        roleEl.textContent = "QUẢN TRỊ VIÊN";
                        roleEl.className = "text-[10px] text-orange-600 font-black uppercase tracking-wider bg-orange-100 dark:bg-orange-900/30 px-3 py-1 rounded-full inline-block mt-1";
                    } else if (role === 'teacher') {
                        roleEl.textContent = "GIÁO VIÊN";
                        roleEl.className = "text-[10px] text-blue-600 font-black uppercase tracking-wider bg-blue-100 dark:bg-blue-900/30 px-3 py-1 rounded-full inline-block mt-1";
                    } else {
                        roleEl.textContent = "HỌC VIÊN";
                        roleEl.className = "text-[10px] text-gray-500 font-black uppercase tracking-wider bg-gray-100 dark:bg-slate-700 px-3 py-1 rounded-full inline-block mt-1";
                    }

                    // Load Data lên UI
                    await initUserData(user, data); 
                }
            } else {
                window.location.href = '../log.html';
            }
        });

        // --- 6. UPDATE PROFILE ---
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Đang lưu...';
            btn.disabled = true;

            const name = document.getElementById('profile-name').value.trim();
            const school = document.getElementById('profile-school').value.trim();
            const grade = document.getElementById('profile-grade').value;

            try {
                await updateDoc(doc(db, "users", currentUser.uid), {
                    name: name, school: school, grade: parseInt(grade), selectedGrade: parseInt(grade)
                });
                document.getElementById('display-name-header').textContent = name;
                const avatarEl = document.getElementById('user-avatar-display');
                if (!avatarEl.querySelector('img')) avatarEl.textContent = name.charAt(0).toUpperCase();
                window.showToast('Thành công', 'Thông tin đã được cập nhật!', 'success');
            } catch (error) { window.showToast('Lỗi', error.message, 'error'); } 
            finally { btn.innerHTML = originalContent; btn.disabled = false; }
        });

        // --- 7. CHANGE PASSWORD & DELETE ACCOUNT ---
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const p1 = document.getElementById('new-password').value;
            const p2 = document.getElementById('confirm-password').value;

            if (p1.length < 6) return window.showToast('Thất bại', 'Mật khẩu phải từ 6 ký tự!', 'error');
            if (p1 !== p2) return window.showToast('Thất bại', 'Mật khẩu xác nhận không khớp!', 'error');

            btn.disabled = true; btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Đang đổi...';

            try {
                await updatePassword(currentUser, p1);
                window.showToast('Thành công', 'Đổi mật khẩu thành công!', 'success');
                e.target.reset();
            } catch (error) {
                if (error.code === 'auth/requires-recent-login') window.showToast('Cảnh báo', 'Vui lòng đăng xuất và đăng nhập lại để đổi mật khẩu.', 'error');
                else window.showToast('Lỗi', error.message, 'error');
            } finally {
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-key"></i> Đổi mật khẩu';
            }
        });

        window.confirmDeleteAccount = () => {
            window.openModal("Xóa tài khoản?", "Hành động này không thể hoàn tác. Mọi dữ liệu học tập của bạn sẽ bị xóa vĩnh viễn.", "danger", () => {
                window.showToast("Thông báo", "Yêu cầu đã được gửi đến Admin.", "success");
            });
        };
    </script>

    <script type="text/javascript">
    // 1. Chặn Chuột phải (Để ẩn menu "Inspect/Kiểm tra" và "View Source/Xem nguồn")
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        // Không hiện thông báo gì cả để trải nghiệm mượt mà hơn
    });

    // 2. Chặn các phím tắt Developer Tools
    document.addEventListener('keydown', function(e) {
        // Chặn F12
        if (e.key === 'F12' || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }

        // Chặn các tổ hợp phím Ctrl + ...
        if (e.ctrlKey) {
            switch (e.key.toLowerCase()) {
                case 'u': // Chặn Ctrl + U (Xem source code)
                case 's': // Chặn Ctrl + S (Lưu trang web)
                case 'p': // Chặn Ctrl + P (In trang web - thường hiện code)
                // Lưu ý: KHÔNG chặn 'c' (Copy) và 'a' (Select All)
                    e.preventDefault();
                    return false;
            }

            // Chặn Ctrl + Shift + ... (Các phím mở DevTools)
            if (e.shiftKey) {
                switch (e.key.toLowerCase()) {
                    case 'i': // Inspect Element
                    case 'j': // Console
                    case 'c': // Element Inspector
                        e.preventDefault();
                        return false;
                }
            }
        }
    });
</script>
