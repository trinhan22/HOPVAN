    <style>
        :root { --primary: #FF8F50; --primary-dark: #ea580c; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FFF5EC; min-height: 100vh; color: #334155; overflow-x: hidden; }
        
        /* Background */
        .fixed-bg { position: fixed; inset: 0; z-index: -10; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.6; animation: float 10s infinite alternate; }
        .blob-1 { width: 500px; height: 500px; background: #ffe4d3; top: -100px; left: -100px; }
        .blob-2 { width: 400px; height: 400px; background: #ffdec2; bottom: -50px; right: -50px; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 50px); } }

        /* UI Components */
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid white; box-shadow: 0 20px 60px -10px rgba(255, 143, 80, 0.15); border-radius: 28px; }
        
        .score-circle { width: 150px; height: 150px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; margin: 0 auto; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); transition: 0.5s; }
        .score-circle.graded { background: conic-gradient(var(--primary) 0%, #fed7aa 0%); box-shadow: 0 10px 40px rgba(255, 143, 80, 0.3); }
        .score-inner { width: 120px; height: 120px; background: white; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .q-card { background: white; border-radius: 20px; padding: 28px; margin-bottom: 24px; border: 1px solid #f1f5f9; box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: 0.2s; position: relative; }
        .q-content { font-family: 'Merriweather', serif; font-size: 1.05rem; line-height: 1.8; color: #1e293b; margin-bottom: 20px; }
        
        .ans-box { padding: 14px 18px; border-radius: 14px; margin-top: 10px; border: 2px solid transparent; font-size: 0.95rem; font-weight: 600; display: flex; align-items: flex-start; gap: 12px; }
        .ans-correct { background: #dcfce7; border-color: #22c55e; color: #14532d; }
        .ans-wrong { background: #fee2e2; border-color: #ef4444; color: #7f1d1d; }
        .ans-neutral { background: #f8fafc; border-color: #e2e8f0; color: #64748b; }
        .ans-selected { background: #eff6ff; border-color: #3b82f6; color: #1e40af; }

        /* GRADING UI (TEACHER) */
        .grading-panel { background: #fff7ed; border: 2px dashed #fed7aa; border-radius: 18px; padding: 20px; margin-top: 24px; position: relative; }
        .grading-label { position: absolute; top: -12px; left: 24px; background: #fff7ed; color: #ea580c; font-weight: 900; font-size: 0.75rem; padding: 2px 10px; border-radius: 6px; letter-spacing: 1px; border: 1px solid #fed7aa; }
        
        .grade-input { width: 100%; border: 1px solid #fdba74; border-radius: 12px; padding: 12px; outline: none; transition: 0.2s; background: white; font-weight: 600; color: #c2410c; }
        .grade-input:focus { border-color: #ea580c; box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.1); }
        .grade-score-input { font-size: 1.5rem; text-align: center; color: #ea580c; font-weight: 900; }

        /* STUDENT VIEW (READ ONLY) */
        .grading-readonly { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 16px; padding: 20px; margin-top: 20px; }
        .grading-readonly .label { color: #15803d; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; margin-bottom: 4px; }

        /* Sticky Footer */
        .teacher-footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); border-top: 1px solid #fed7aa; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; z-index: 50; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .teacher-footer.active { transform: translateY(0); }

        /* Status Badges */
        .st-badge { padding: 6px 16px; border-radius: 30px; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.5px; }
        .st-wait { background: #fef9c3; color: #854d0e; border: 1px solid #facc15; }
        .st-done { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }

        /* --- GLOBAL SCROLLBAR --- */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255, 143, 80, 0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background-color: rgba(255, 143, 80, 0.3); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; transition: background-color 0.3s ease; }
        ::-webkit-scrollbar-thumb:hover { background-color: #FF8F50; border: 1px solid transparent; }
        ::-webkit-scrollbar-button { display: none; }

        /* --- AI ASSISTANT STYLES --- */
        .ai-btn {
            background: linear-gradient(135deg, #6366f1, #a855f7); /* Tím mộng mơ */
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* Hiệu ứng lấp lánh */
        .ai-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }

        .ai-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5);
        }

        .ai-btn:disabled {
            background: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Hiệu ứng AI đang viết */
        .ai-typing {
            display: inline-block;
            width: 12px; height: 12px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }
    </style>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, serverTimestamp, collection, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAJ9C2biYeiLPmhakzLZ4mEqfO9_VgPSZE", authDomain: "hopvan-9a648.firebaseapp.com", projectId: "hopvan-9a648", storageBucket: "hopvan-9a648.appspot.com", messagingSenderId: "429347196227", appId: "1:429347196227:web:917b8d019f0efd0f7833f6", measurementId: "G-1BG8PSRG0R" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- STATE ---
        let currentUser = null;
        let currentRole = 'student';
        let submissionId = null;
        let submissionData = null;
        let questions = [];
        let gradingData = { scores: {}, comments: {} };

        // --- 1. KHỞI TẠO ---
        onAuthStateChanged(auth, async (user) => {
            if(user) {
                currentUser = user;
                try {
                    const uSnap = await getDoc(doc(db, "users", user.uid));
                    if(uSnap.exists()) {
                        const uData = uSnap.data();
                        currentRole = uData.role || 'student';
                        document.getElementById('user-name').innerText = uData.name || "Người dùng";
                        document.getElementById('role-badge').innerText = currentRole === 'teacher' ? 'GIÁO VIÊN' : 'HỌC SINH';
                        document.getElementById('user-avatar').innerText = (uData.name || 'U').charAt(0).toUpperCase();
                    }
                    await findAndLoadSubmission();
                } catch (e) {
                    console.error(e);
                    showError("Lỗi xác thực người dùng.");
                }
            } else window.location.href = "../log.html";
        });

        // --- 2. TÌM BÀI LÀM ---
        async function findAndLoadSubmission() {
            const params = new URLSearchParams(window.location.search);
            let subId = params.get('submissionId');
            let tId = params.get('testId'); 

            if (subId === "undefined" || subId === "null") subId = null;

            if (subId) {
                await loadData(subId);
                return;
            }

            const sessionSubId = sessionStorage.getItem('latestResultId');
            if (sessionSubId && sessionSubId !== "undefined") {
                replaceUrlParam('submissionId', sessionSubId);
                await loadData(sessionSubId);
                return;
            }

            if (tId && currentRole === 'student') {
                try {
                    const q = query(collection(db, "submissions"), where("testId", "==", tId), where("studentId", "==", currentUser.uid));
                    const snap = await getDocs(q);
                    
                    if (!snap.empty) {
                        const list = snap.docs.map(d=>({id:d.id, ...d.data()}));
                        list.sort((a,b) => (b.submittedAt?.seconds || 0) - (a.submittedAt?.seconds || 0));
                        replaceUrlParam('submissionId', list[0].id);
                        await loadData(list[0].id);
                    } else {
                        showError("Bạn chưa làm bài kiểm tra này.");
                    }
                } catch (e) {
                    showError("Lỗi tìm kiếm: " + e.message);
                }
                return;
            }
            showError("Không tìm thấy thông tin bài làm.");
        }

        function replaceUrlParam(key, value) {
            const newUrl = new URL(window.location);
            newUrl.searchParams.set(key, value);
            window.history.replaceState({}, '', newUrl);
        }

        // --- 3. TẢI DỮ LIỆU ---
        async function loadData(id) {
            submissionId = id;
            try {
                const subRef = doc(db, "submissions", id);
                const subSnap = await getDoc(subRef);
                if (!subSnap.exists()) throw new Error("Bài làm không tồn tại.");
                
                submissionData = subSnap.data();

                // === [CODE MỚI] XỬ LÝ NÚT QUAY LẠI ===
                const btnBack = document.getElementById('btn-back');
                if (currentRole === 'teacher') {
                    // Nếu là Giáo viên: Ẩn nút
                    btnBack.style.display = 'none';
                } else {
                    // Nếu là Học sinh: Quay về lớp học
                    btnBack.onclick = () => {
                        if (submissionData.classId) {
                            window.location.href = `classroom-view.html?classId=${submissionData.classId}`;
                        } else {
                            // Fallback nếu không tìm thấy ID lớp
                            window.location.href = 'classrooms.html';
                        }
                    };
                }
                // ======================================

                if (currentRole === 'student' && submissionData.studentId !== currentUser.uid) {
                    throw new Error("Bạn không có quyền truy cập.");
                }

                if (currentRole === 'teacher') {
                    gradingData.scores = submissionData.essayScores || {};
                    gradingData.comments = submissionData.questionComments || {};
                }

                questions = await fetchQuestions(submissionData.testId);
                
                renderUI();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } catch(e) {
                console.error(e);
                showError(e.message);
            }
        }

        async function fetchQuestions(testId) {
            const snap = await getDoc(doc(db, "tests", testId));
            if(!snap.exists()) return []; 
            const d = snap.data();
            
            let qs = [];
            if (d.questions && d.questions.length > 0) {
                qs = d.questions.map((q,i)=>({...q, id:q.id||`q_${i}`}));
            } else if (d.questionIds && d.questionIds.length > 0) {
                const ids = d.questionIds;
                const chunks = [];
                for(let i=0; i<ids.length; i+=10) chunks.push(ids.slice(i,i+10));
                for(const chunk of chunks) {
                    const qSnap = await getDocs(query(collection(db,"questions"), where("__name__","in",chunk)));
                    qSnap.forEach(doc => qs.push({id:doc.id, ...doc.data()}));
                }
                qs.sort((a,b) => ids.indexOf(a.id) - ids.indexOf(b.id));
            }
            return qs;
        }

        // --- 4. RENDER GIAO DIỆN (LOGIC CHÍNH ĐÃ SỬA) ---
        function renderUI() {
            const hasEssay = questions.some(q => ['reading', 'essay', 'nlxh', 'nlvh'].includes(q.type));
            const isFullQuiz = !hasEssay && questions.length > 0;
            
            const isTeacher = currentRole === 'teacher';
            const isPublished = submissionData.isPublished === true;
            
            // --- CỜ ĐIỀU KHIỂN HIỂN THỊ (QUAN TRỌNG) ---
            
            // 1. Ai được xem ĐIỂM TỔNG KẾT?
            // GV xem hết. HS xem khi Public HOẶC Đề Full Trắc nghiệm
            const canShowScore = isTeacher || isPublished || isFullQuiz;

            // 2. Ai được xem CHI TIẾT BÀI LÀM (Câu hỏi, đáp án, lời phê)?
            // GV xem hết. HS CHỈ XEM KHI ĐÃ PUBLIC (Bất kể full quiz hay không)
            const canShowDetails = isTeacher || isPublished;


            // --- HEADER INFO ---
            document.getElementById('test-name').innerText = submissionData.testName || "Bài Kiểm Tra";
            document.getElementById('submit-time').innerText = "Nộp: " + (submissionData.submittedAt?.toDate().toLocaleString('vi-VN') || "N/A");

            // --- SCORE BOX ---
            const mcqScore = submissionData.quizScore || 0;
            const totalMcq = submissionData.totalQuiz || 0;
            
            // LUÔN HIỆN: Số câu trắc nghiệm đúng
            document.getElementById('mcq-score').innerText = mcqScore;
            document.getElementById('mcq-detail').innerText = `${mcqScore}/${totalMcq} câu đúng`;

            // Tính toán điểm tổng (để dùng nếu được hiện)
            let finalScore = submissionData.score || 0;
            if (isFullQuiz && finalScore === 0 && submissionData.totalQuestions > 0) {
                finalScore = (mcqScore / submissionData.totalQuestions) * 10;
            } else if (isTeacher && finalScore === 0) {
                const essayTotal = Object.values(gradingData.scores).reduce((a,b)=>a+b, 0);
                finalScore = mcqScore + essayTotal; 
            }

            // --- HIỂN THỊ VÒNG TRÒN ĐIỂM (SCORE CIRCLE) ---
            if (canShowScore) {
                document.getElementById('final-score').innerText = Number(finalScore).toFixed(1);
                
                // Color Ring
                const ring = document.getElementById('score-ring');
                ring.classList.add('graded');
                const color = finalScore >= 8 ? '#10B981' : (finalScore >= 5 ? '#F59E0B' : '#EF4444');
                ring.style.background = `conic-gradient(${color} ${(finalScore/10)*100}%, #f1f5f9 0%)`;

                if(finalScore >= 8 && !isTeacher) launchConfetti();
            } else {
                // Ẩn điểm tổng (Chờ chấm)
                document.getElementById('final-score').innerHTML = '<i class="fas fa-hourglass-half opacity-20"></i>';
                
                // Gray Ring
                document.getElementById('score-ring').classList.remove('graded');
                document.getElementById('score-ring').style.background = '#e2e8f0';
            }

            // --- BADGE TRẠNG THÁI & ESSAY STATUS ---
            const badge = document.getElementById('status-badge');
            
            if (isPublished) {
                badge.innerText = "ĐÃ CÔNG BỐ"; badge.className = "st-badge st-done";
                document.getElementById('essay-score').innerText = submissionData.essayScore || 0;
                document.getElementById('essay-status').innerText = "Đã chấm xong";
            } 
            else if (isFullQuiz) {
                badge.innerText = "ĐÃ HOÀN THÀNH"; badge.className = "st-badge st-done";
                document.getElementById('essay-score').innerHTML = '<span class="text-gray-300 text-lg">N/A</span>';
                document.getElementById('essay-status').innerText = "Không có tự luận";
            } 
            else {
                badge.innerText = "CHỜ CHẤM ĐIỂM"; badge.className = "st-badge st-wait";
                document.getElementById('essay-score').innerText = "--";
                document.getElementById('essay-status').innerText = "Giáo viên đang chấm...";
            }


            // --- FEEDBACK AREA ---
            const fbArea = document.getElementById('feedback-area');
            if(isTeacher) {
                fbArea.innerHTML = `<textarea id="teacher-general-feedback" class="w-full p-4 border border-orange-200 rounded-2xl bg-white focus:border-orange-500 outline-none transition shadow-sm h-32 resize-none text-gray-700" placeholder="Nhập lời phê chung...">${submissionData.teacherComment || ''}</textarea>`;
                document.getElementById('teacher-footer').classList.add('active');
                document.getElementById('live-total-score').innerText = Number(finalScore).toFixed(1);
                document.getElementById('publish-check').checked = isPublished || isFullQuiz;
            } else {
                // Học sinh chỉ thấy lời phê khi canShowDetails (Đã Public)
                if(canShowDetails && submissionData.teacherComment) {
                    fbArea.innerHTML = `<div class="bg-orange-50 p-5 rounded-2xl border border-orange-100 italic text-gray-700 relative"><i class="fas fa-quote-left text-orange-200 absolute top-2 left-2 text-2xl"></i><span class="relative z-10 ml-4">${submissionData.teacherComment}</span></div>`;
                } else if (!canShowDetails) {
                    fbArea.innerHTML = `<div class="p-6 text-center bg-gray-50 rounded-2xl border border-dashed border-gray-200 text-gray-400 font-medium"><i class="fas fa-lock mr-2"></i>Nhận xét sẽ hiển thị khi giáo viên trả bài.</div>`;
                } else {
                    fbArea.innerHTML = `<p class="text-gray-400 italic text-sm text-center">Chưa có nhận xét.</p>`;
                }
            }

            // --- CHI TIẾT BÀI LÀM (QUESTIONS LIST) ---
            const listEl = document.getElementById('questions-list');
            
            // QUAN TRỌNG: Ẩn chi tiết nếu chưa được phép xem (kể cả full trắc nghiệm)
            if (!canShowDetails) {
                listEl.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 bg-white/50 rounded-3xl border-2 border-dashed border-gray-100">
                        <div class="w-20 h-20 bg-orange-50 rounded-full flex items-center justify-center text-3xl text-orange-400 mb-4 shadow-sm">
                            <i class="fas fa-user-shield"></i>
                        </div>
                        <h3 class="text-xl font-black text-gray-700">Chi tiết bài làm được ẩn</h3>
                        <p class="text-gray-500 mt-2 max-w-md text-center text-sm">
                            Giáo viên chưa công bố bài làm chi tiết. <br>Bạn vui lòng quay lại sau khi có thông báo trả bài.
                        </p>
                        <div class="mt-6 flex gap-3 text-sm font-bold text-gray-500 bg-gray-50 px-4 py-2 rounded-lg border border-gray-100">
                            <span><i class="fas fa-check-circle text-green-500 mr-1"></i> Kết quả trắc nghiệm: <span class="text-gray-800">${mcqScore}/${totalMcq}</span></span>
                        </div>
                    </div>
                `;
                document.getElementById('view-mode').innerText = "Chế độ riêng tư";
                return; // Dừng, không render list câu hỏi
            }

            // Nếu được xem -> Render bình thường
            document.getElementById('view-mode').innerText = "Chi tiết đầy đủ";
            
            if (questions.length === 0) {
                listEl.innerHTML = `<p class="text-center text-gray-400">Không tải được nội dung đề thi.</p>`;
                return;
            }

            listEl.innerHTML = questions.map((q, idx) => {
                const ans = submissionData.answers ? submissionData.answers[q.id] : null;
                const num = idx + 1;

                if (q.type === 'quiz') {
                    const opts = (q.options||[]).map((opt, i) => {
                        const char = String.fromCharCode(65+i);
                        let cls = "ans-neutral";
                        let icon = "";
                        
                        if (String(i) === String(q.correct)) { cls = "ans-correct"; icon = '<i class="fas fa-check text-green-700"></i>'; }
                        else if (String(i) === String(ans) && String(i) !== String(q.correct)) { cls = "ans-wrong"; icon = '<i class="fas fa-times text-red-700"></i>'; }
                        
                        return `<div class="ans-box ${cls}"><span class="font-black w-6 text-gray-400">${char}.</span><span class="flex-1">${opt}</span>${icon}</div>`;
                    }).join('');

                    return `
                    <div class="q-card">
                        <div class="flex justify-between mb-3 pl-1">
                            <span class="font-black text-gray-400 text-sm">CÂU ${num}</span>
                            ${(String(ans)===String(q.correct)?'<span class="text-green-600 font-bold text-xs bg-green-100 px-2 py-1 rounded">ĐÚNG</span>':'<span class="text-red-600 font-bold text-xs bg-red-100 px-2 py-1 rounded">SAI</span>')}
                        </div>
                        <div class="q-content font-bold text-gray-800">${q.question}</div>
                        <div class="space-y-1">${opts}</div>
                        ${q.explanation ? `<div class="mt-4 p-4 bg-blue-50 text-blue-800 text-sm rounded-xl border border-blue-100 leading-relaxed">💡 <b>Giải thích:</b> ${q.explanation}</div>` : ''}
                    </div>`;
                } 
                else {
                    let teacherTools = '';
                    // --- CODE MỚI: GIAO DIỆN CHẤM ĐIỂM CÓ AI ---
                        if (isTeacher) {
                            const curScore = gradingData.scores[q.id] || 0;
                            const curCmt = gradingData.comments[q.id] || '';
                            
                            // Nút AI + Input điểm + Input nhận xét
                            teacherTools = `
                            <div class="grading-panel">
                                <div class="flex justify-between items-start mb-3">
                                    <div class="grading-label">CHẤM ĐIỂM THỦ CÔNG</div>
                                    <button onclick="window.triggerAI('${q.id}')" class="ai-btn" id="btn-ai-${q.id}">
                                        <i class="fas fa-magic"></i> <span>Gợi ý AI</span>
                                    </button>
                                </div>
                                
                                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div>
                                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Điểm số (0-10)</label>
                                        <input type="number" id="score-${q.id}" class="grade-input grade-score-input" value="${curScore}" min="0" max="10" step="0.25" oninput="window.updateLiveScore('${q.id}', this.value)">
                                    </div>
                                    <div class="md:col-span-3">
                                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Lời phê / Nhận xét</label>
                                        <div class="relative">
                                            <input type="text" id="cmt-${q.id}" class="grade-input text-sm h-[54px] pr-10" value="${curCmt}" placeholder="Nhập nhận xét..." onchange="window.updateComment('${q.id}', this.value)">
                                            <i class="fas fa-pen absolute right-4 top-4 text-gray-300"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>`;
                    } else {
                        const s = submissionData.essayScores?.[q.id];
                        const c = submissionData.questionComments?.[q.id];
                        if (s !== undefined || c) {
                            teacherTools = `<div class="grading-readonly"><div class="flex justify-between items-center mb-2"><span class="label">ĐÁNH GIÁ GV</span>${s!==undefined?`<span class="bg-green-100 text-green-700 font-black px-3 py-1 rounded-full text-sm">+${s}đ</span>`:''}</div>${c?`<p class="text-sm text-gray-800 bg-white p-3 rounded-lg border border-green-100">"${c}"</p>`:''}</div>`;
                        }
                    }

                    return `
                    <div class="q-card border-l-4 border-orange-400">
                        <div class="flex justify-between mb-3 pl-1">
                            <span class="font-black text-gray-400 text-sm">CÂU ${num} (Tự luận)</span>
                            <span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold border border-orange-200">ĐÃ CHẤM</span>
                        </div>
                        <div class="q-content text-sm text-gray-600 bg-gray-50 p-4 rounded-xl mb-4 italic leading-relaxed border border-gray-100">
                            ${q.type === 'reading' ? `(Đọc hiểu) ${q.text.substring(0,100)}...` : q.topic}
                        </div>
                        <div class="p-5 bg-white rounded-xl border-2 border-gray-100">
                            <p class="text-xs font-bold text-gray-400 uppercase mb-2 flex items-center gap-1"><i class="fas fa-pen"></i> Bài làm:</p>
                            <p class="text-gray-800 font-serif whitespace-pre-wrap text-sm leading-7">${formatEssay(ans)}</p>
                        </div>
                        ${teacherTools}
                    </div>`;
                }
            }).join('');

            if(window.renderMathInElement) renderMathInElement(listEl);
        }

        // --- TÍNH NĂNG AI SUPPORT (Đã Fix: Khớp logic Groq/Proxy) ---
        window.triggerAI = async (qId) => {
            const btn = document.getElementById(`btn-ai-${qId}`);
            const scoreInput = document.getElementById(`score-${qId}`);
            const cmtInput = document.getElementById(`cmt-${qId}`);
            
            // 1. Lấy dữ liệu câu hỏi
            const questionData = questions.find(q => q.id === qId);
            const studentAns = submissionData.answers ? submissionData.answers[qId] : "";
            const topic = questionData ? (questionData.topic || questionData.question) : "Câu hỏi không xác định";

            if (!questionData) { alert("Lỗi: Không tìm thấy dữ liệu câu hỏi"); return; }

            // 2. Hiệu ứng Loading
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="ai-typing"></span> Đang chấm...`;
            btn.disabled = true;

            // URL API (Dùng chung với file luyện đề)
            const API_URL = `/.netlify/functions/gemini-proxy`;

            try {
                // 2. Chuẩn bị Prompt (Phiên bản Giáo viên Tâm huyết - Barem chi tiết)
                const systemPrompt = `
                VAI TRÒ: Bạn là Giáo viên Ngữ văn lớp 12 giàu kinh nghiệm, chấm thi rất kỹ tính và tâm huyết.
                
                NHIỆM VỤ: Chấm điểm 1 câu hỏi và đưa ra lời phê chi tiết (tối thiểu 40 từ).

                BAREM ĐIỂM CỤ THỂ (QUAN TRỌNG - Cần xác định đúng loại câu):

                A. PHẦN ĐỌC HIỂU (Dựa vào nội dung câu hỏi để xác định mức độ):
                   1. Mức NHẬN BIẾT (Thường là Câu 1, 2, 3 - Hỏi thể thơ, PTBĐ, chỉ ra từ ngữ/hình ảnh...):
                      - Điểm tối đa: 0.5 điểm.
                      - Yêu cầu: Trả lời chính xác, ngắn gọn. Sai hoặc thiếu ý chính -> 0 điểm.
                   
                   2. Mức VẬN DỤNG/THÔNG HIỂU (Thường là Câu 4, 5 - Hỏi "Hiểu thế nào", "Thông điệp", "Đồng tình không"...):
                      - Điểm tối đa: 1.0 điểm.
                      - Yêu cầu: Giải thích thấu đáo, lập luận thuyết phục. Trả lời hời hợt, chung chung -> Trừ 0.5 điểm.

                B. PHẦN LÀM VĂN (NLXH hoặc NLVH):
                   - Nếu là ĐOẠN VĂN (~200 chữ): Max 2.0 điểm. (Trừ điểm nặng nếu tách đoạn hoặc thiếu dẫn chứng).
                   - Nếu là BÀI VĂN (~600 chữ): Max 5.0 - 6.0 điểm. (Yêu cầu bố cục 3 phần, luận điểm sâu sắc).

                YÊU CẦU VỀ LỜI PHÊ (COMMENT):
                - ĐỘ DÀI: Bắt buộc từ 40 đến 80 từ. Tuyệt đối không nhận xét sơ sài kiểu "Bài làm tốt".
                - CẤU TRÚC 3 PHẦN:
                  + Điểm sáng: Khen ngợi tư duy, cách dùng từ hoặc ý tưởng hay.
                  + Điểm trừ: Chỉ rõ lỗi diễn đạt (lủng củng, sáo rỗng), lỗi kiến thức hoặc lỗi trình bày.
                  + Lời khuyên: Gợi ý cụ thể cách sửa để nâng điểm số.

                OUTPUT JSON FORMAT (BẮT BUỘC):
                {
                    "score": (số thực, làm tròn 0.25),
                    "comment": (chuỗi string, giọng văn giáo viên ân cần nhưng nghiêm khắc, phân tích kỹ ưu nhược điểm)
                }
                `;

                const userMessage = `
                ĐỀ BÀI: "${topic}"
                BÀI LÀM CỦA HỌC SINH: "${studentAns}"
                
                Hãy chấm điểm ngay theo barem trên.
                `;

                // 4. Gọi API (Logic giống hệt file fulltest.html)
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ 
                        systemPrompt: systemPrompt, 
                        messages: userMessage // Groq proxy nhận key 'messages'
                    }) 
                });

                if (!res.ok) throw new Error(`Lỗi Server: ${res.status}`);

                const data = await res.json();
                
                // KIỂM TRA ĐÚNG ĐỊNH DẠNG CỦA GROQ/OPENAI
                if (!data.choices || !data.choices[0] || !data.choices[0].message) {
                    throw new Error("AI không trả về kết quả đúng định dạng");
                }

                // 5. Xử lý JSON (Làm sạch markdown)
                let rawText = data.choices[0].message.content;
                rawText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                
                const firstBrace = rawText.indexOf('{');
                const lastBrace = rawText.lastIndexOf('}');
                if (firstBrace !== -1 && lastBrace !== -1) {
                    rawText = rawText.substring(firstBrace, lastBrace + 1);
                }

                const result = JSON.parse(rawText);

                // 6. Hiển thị kết quả
                let finalScore = parseFloat(result.score);
                if (isNaN(finalScore)) finalScore = 0;
                
                // Điền điểm
                scoreInput.value = finalScore;
                window.updateLiveScore(qId, finalScore);

                // Điền lời phê (Hiệu ứng gõ chữ)
                const aiComment = result.comment || "Đã chấm xong.";
                cmtInput.value = "";
                
                // Xóa interval cũ nếu có (tránh lỗi khi bấm liên tục)
                if (window['typing_' + qId]) clearInterval(window['typing_' + qId]);

                let i = 0;
                window['typing_' + qId] = setInterval(() => {
                    if (i < aiComment.length) {
                        cmtInput.value += aiComment.charAt(i);
                        i++;
                    } else {
                        clearInterval(window['typing_' + qId]);
                        window.updateComment(qId, aiComment); // Lưu comment vào biến nhớ
                    }
                }, 15);

                showToast("✨ AI đã chấm xong!");

            } catch (e) {
                console.error("AI Error:", e);
                alert("Hệ thống đang bận hoặc gặp lỗi kết nối. Thầy/Cô vui lòng chấm thủ công câu này nhé!");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        // --- GLOBAL ACTIONS ---
        window.updateLiveScore = (qId, val) => {
            gradingData.scores[qId] = parseFloat(val) || 0;
            const totalEssay = Object.values(gradingData.scores).reduce((a,b)=>a+b, 0);
            const final = (submissionData.quizScore || 0) + totalEssay;
            document.getElementById('live-total-score').innerText = final.toFixed(1);
        };

        window.updateComment = (qId, val) => { gradingData.comments[qId] = val; };

        window.saveGrading = async () => {
            const btn = document.querySelector('#save-btn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>Đang lưu...</span>`;
            btn.disabled = true;

            try {
                const totalEssay = Object.values(gradingData.scores).reduce((a,b)=>a+b, 0);
                const finalScore = (submissionData.quizScore || 0) + totalEssay;
                const genCmt = document.getElementById('teacher-general-feedback').value;
                const doPublish = document.getElementById('publish-check').checked;

                await updateDoc(doc(db, "submissions", submissionId), {
                    essayScore: totalEssay,
                    essayScores: gradingData.scores,
                    questionComments: gradingData.comments,
                    teacherComment: genCmt,
                    score: finalScore,
                    isPublished: doPublish,
                    gradedAt: serverTimestamp()
                });

                showToast("Đã lưu kết quả thành công!");
                setTimeout(() => location.reload(), 1000);
            } catch(e) {
                console.error(e);
                alert("Lỗi lưu: " + e.message);
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        };

        // --- UTILS ---
        function formatEssay(ans) {
            if(!ans) return "(Bỏ trống)";
            if(typeof ans === 'object') return Object.entries(ans).map(([k,v]) => `Ý ${parseInt(k)+1}: ${v}`).join('\n\n');
            return ans;
        }
        function showError(msg) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-screen').classList.remove('hidden');
            document.getElementById('error-msg').innerText = msg;
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(()=>t.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
        function launchConfetti() {
            const c = document.getElementById('confetti-canvas'); const ctx = c.getContext('2d');
            c.width=innerWidth; c.height=innerHeight;
            let p=[]; for(let i=0;i<100;i++) p.push({x:Math.random()*c.width,y:Math.random()*c.height-c.height,r:Math.random()*6+2,d:Math.random()*100,c:`hsl(${Math.random()*360},100%,60%)`,t:Math.random()*10-10});
            function d(){ctx.clearRect(0,0,c.width,c.height);p.forEach(x=>{ctx.beginPath();ctx.lineWidth=x.r;ctx.strokeStyle=x.c;ctx.moveTo(x.x+x.t,x.y);ctx.lineTo(x.x,x.y+x.r*2);ctx.stroke();x.y+=5;x.t=Math.sin(x.d)*5});requestAnimationFrame(d)} d();
        }
    </script>

<script type="text/javascript">
    // 1. Chặn Chuột phải (Để ẩn menu "Inspect/Kiểm tra" và "View Source/Xem nguồn")
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        // Không hiện thông báo gì cả để trải nghiệm mượt mà hơn
    });

    // 2. Chặn các phím tắt Developer Tools
    document.addEventListener('keydown', function(e) {
        // Chặn F12
        if (e.key === 'F12' || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }

        // Chặn các tổ hợp phím Ctrl + ...
        if (e.ctrlKey) {
            switch (e.key.toLowerCase()) {
                case 'u': // Chặn Ctrl + U (Xem source code)
                case 's': // Chặn Ctrl + S (Lưu trang web)
                case 'p': // Chặn Ctrl + P (In trang web - thường hiện code)
                // Lưu ý: KHÔNG chặn 'c' (Copy) và 'a' (Select All)
                    e.preventDefault();
                    return false;
            }

            // Chặn Ctrl + Shift + ... (Các phím mở DevTools)
            if (e.shiftKey) {
                switch (e.key.toLowerCase()) {
                    case 'i': // Inspect Element
                    case 'j': // Console
                    case 'c': // Element Inspector
                        e.preventDefault();
                        return false;
                }
            }
        }
    });
</script>
