<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lớp Học Của Tôi - HopVan</title>
    <meta property="og:title" content="HOPVAN - Nền Tảng Học & Luyện Thi Ngữ Văn" />
    <meta property="og:description" content="Nền tảng học tập Ngữ Văn tích hợp AI – hỗ trợ tự học thông minh, phân tích tác phẩm, luyện viết hiệu quả." />
    <meta property="og:image" content="https://hopvan.info.vn/panel.webp" />

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --primary: #FF8F50;
            --primary-gradient: linear-gradient(135deg, #FF8F50, #FF5E62);
            --sidebar-width: 260px;

            /* MÀU SÁNG */
            --bg-body: #FFF5EC;
            --bg-glass: rgba(255, 255, 255, 0.6);
            --bg-panel: rgba(255, 255, 255, 0.9);
            --bg-panel-hover: white;
            --bg-input: #f8fafc;
            --border-panel: rgba(255, 255, 255, 0.8);
            --border-input: #e2e8f0;
            --text-heading: #2D3436;
            --text-sub: #636E72;
            --shadow-card: 0 10px 30px rgba(0,0,0,0.03);
            --shadow-hover: 0 20px 40px rgba(255, 143, 80, 0.15);
        }

        /* MÀU TỐI */
        html.dark {
            --bg-body: #0f172a;       /* slate-900 */
            --bg-glass: rgba(15, 23, 42, 0.7);
            --bg-panel: rgba(30, 41, 59, 0.85); /* slate-800 */
            --bg-panel-hover: #1e293b;
            --bg-input: #0f172a;
            --border-panel: #334155;  /* slate-700 */
            --border-input: #475569;  /* slate-600 */
            --text-heading: #f8fafc;
            --text-sub: #94a3b8;
            --shadow-card: 0 10px 30px rgba(0,0,0,0.3);
            --shadow-hover: 0 20px 40px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease; }
        body { background-color: var(--bg-body); height: 100vh; overflow: hidden; display: flex; color: var(--text-sub); }

        /* --- BACKGROUND BLOBS --- */
        .background-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: floatBlob 10s infinite alternate; transition: opacity 0.5s; }
        .blob-1 { width: 500px; height: 500px; background: #FCA96A; top: -100px; left: -100px; }
        .blob-2 { width: 400px; height: 400px; background: #FCD5B5; bottom: -50px; right: -50px; animation-delay: -5s; }
        html.dark .blob { opacity: 0.15; }
        @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }

        /* --- ĐỒNG BỘ DARK MODE CHO MENU.JS --- */
        html.dark #menu-placeholder aside, 
        html.dark #menu-placeholder .sidebar { background-color: var(--bg-panel) !important; border-color: var(--border-panel) !important; }
        html.dark #menu-placeholder aside > div,
        html.dark #menu-placeholder .sidebar > div { background-color: transparent !important; border-color: var(--border-panel) !important; }
        html.dark #menu-placeholder button { background-color: var(--bg-body) !important; border: 1px solid var(--border-panel) !important; color: var(--text-sub) !important; box-shadow: none !important; }
        html.dark #menu-placeholder button:hover { background-color: var(--bg-panel-hover) !important; border-color: var(--primary) !important; color: var(--primary) !important; }
        html.dark #menu-placeholder .nav-item.active { background: var(--primary-gradient) !important; color: white !important; border-color: transparent !important; box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4) !important; }
        html.dark #menu-placeholder div[style*="background-color"] { background-color: var(--bg-body) !important; border-color: var(--border-panel) !important; }
        html.dark #menu-placeholder [class*="border-"] { border-color: var(--border-panel) !important; }
        html.dark #menu-placeholder .text-gray-800, html.dark #menu-placeholder h1 { color: var(--text-heading) !important; }
        html.dark #menu-placeholder .text-gray-500, html.dark #menu-placeholder .text-gray-400 { color: var(--text-sub) !important; }
        html.dark #menu-placeholder .nav-item { color: var(--text-sub) !important; transition: 0.3s; }
        html.dark #menu-placeholder .nav-item:hover { background-color: rgba(255, 143, 80, 0.1) !important; color: var(--primary) !important; }

        /* --- LAYOUT CHÍNH --- */
        .mobile-header { display: none; position: fixed; top: 0; left: 0; right: 0; height: 60px; background: var(--bg-panel); z-index: 100; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border-panel); }
        #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 998; }

        .main-content {
            margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); height: 100%;
            background: var(--bg-glass); backdrop-filter: blur(var(--blur)); border-left: 1px solid var(--border-panel);
            padding: 30px 40px; overflow-y: auto; position: relative;
        }

        /* --- CLASSROOM CARD --- */
        .class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; margin-top: 30px; }
        
        .class-card {
            background: var(--bg-panel); border-radius: 24px; padding: 24px;
            border: 1px solid var(--border-panel); box-shadow: var(--shadow-card);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; flex-direction: column; position: relative; overflow: hidden;
        }
        .class-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); border-color: var(--primary); background: var(--bg-panel-hover); }

        .class-badge { display: inline-block; padding: 6px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; background: rgba(255, 143, 80, 0.1); color: var(--primary); width: fit-content; margin-bottom: 12px; }
        .class-title { font-size: 1.25rem; font-weight: 800; color: var(--text-heading); margin-bottom: 4px; line-height: 1.4; }
        .class-teacher { font-size: 0.9rem; color: var(--text-sub); display: flex; align-items: center; gap: 6px; margin-bottom: 20px; }
        html.dark .class-card i.fa-book-open { opacity: 0.05; }

        .btn-enter {
            margin-top: auto; background: var(--primary-gradient); color: white; padding: 12px; border-radius: 14px;
            font-weight: 700; text-align: center; text-decoration: none; box-shadow: 0 5px 15px rgba(255, 94, 98, 0.25); display: block; transition: all 0.2s;
        }
        .btn-enter:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 94, 98, 0.35); }

        .btn-add-class {
            background: transparent; color: var(--primary); border: 2px solid var(--primary); padding: 10px 20px;
            border-radius: 14px; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s;
        }
        .btn-add-class:hover { background: var(--primary); color: white; }

        /* --- MODAL (POPUP) --- */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.open { display: flex; opacity: 1; }
        
        .modal-content {
            background: var(--bg-panel); width: 90%; max-width: 480px; padding: 40px; border-radius: 32px; border: 1px solid var(--border-panel);
            text-align: center; position: relative; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .modal-overlay.open .modal-content { transform: scale(1); }
        .modal-content h2 { color: var(--text-heading); }
        .modal-content p { color: var(--text-sub); }

        .close-btn {
            position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; border-radius: 50%;
            background: var(--bg-input); color: var(--text-sub); border: 1px solid var(--border-input);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .close-btn:hover { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: transparent; transform: rotate(90deg); }

        .code-input {
            width: 100%; padding: 18px; font-size: 1.8rem; text-align: center; letter-spacing: 0.3em;
            font-weight: 900; color: var(--text-heading); background: var(--bg-input); border: 2px solid var(--border-input);
            border-radius: 20px; outline: none; transition: all 0.3s; text-transform: uppercase; margin-top: 20px;
        }
        .code-input:focus { border-color: var(--primary); background: var(--bg-panel); box-shadow: 0 0 0 5px rgba(255, 143, 80, 0.1); transform: scale(1.02); }

        .preview-box {
            margin-top: 20px; padding: 15px; background: rgba(255, 143, 80, 0.05); border-radius: 16px; border: 2px dashed rgba(255, 143, 80, 0.2);
            display: none; align-items: center; gap: 15px; text-align: left; animation: slideDown 0.3s;
        }
        .preview-box.active { display: flex; }
        .preview-box h4 { color: var(--text-heading); }
        .preview-avatar { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; border: 2px solid var(--border-panel); }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-confirm-join {
            width: 100%; padding: 16px; margin-top: 20px; background: var(--primary-gradient);
            color: white; font-weight: 800; border-radius: 16px; font-size: 1rem;
            transition: all 0.3s; box-shadow: 0 10px 25px rgba(255, 94, 98, 0.3); border: none; cursor: pointer;
        }
        .btn-confirm-join:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(255, 94, 98, 0.4); }
        .btn-confirm-join:disabled { opacity: 0.6; cursor: not-allowed; background: #9ca3af; box-shadow: none; }

        /* --- TOAST --- */
        #toast { position: fixed; top: 30px; right: 30px; background: white; padding: 15px 25px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 10px; z-index: 10000; transform: translateX(200%); transition: 0.5s; }
        #toast.show { transform: translateX(0); }

        /* Mobile */
        @media (max-width: 768px) {
            aside { display: none; }
            .mobile-header { display: flex; }
            .main-content { margin-left: 0; width: 100%; padding: 80px 20px 40px; border-left: none; }
            .class-grid { grid-template-columns: 1fr; }
        }

        /* --- GLOBAL SCROLLBAR --- */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255, 143, 80, 0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background-color: rgba(255, 143, 80, 0.3); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; transition: background-color 0.3s ease; }
        ::-webkit-scrollbar-thumb:hover { background-color: #FF8F50; border: 1px solid transparent; }
        ::-webkit-scrollbar-button { display: none; }

        /* --- USER HEADER STYLE (Giống Dashboard) --- */
        .user-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; position: relative; z-index: 10;
        }
        
        /* ĐÃ FIX: Chữ "Xin chào" sáng lên ở Dark Mode */
        .welcome-text h2 { 
            font-size: 2rem; font-weight: 800; 
            color: var(--text-heading); /* Thay mã màu đen cứng bằng biến tự động */
            margin-bottom: 4px;
        }
        
        /* ĐÃ FIX: Lời chúc phụ sáng mờ tinh tế */
        .welcome-text p {
            color: var(--text-sub) !important;
        }

        /* ĐÃ FIX: Chữ "DANH SÁCH LỚP" thoát khỏi class text-gray-700 của Tailwind */
        html.dark .text-gray-700 {
            color: var(--text-heading) !important;
        }

        .user-avatar { 
            width: 50px; height: 50px; 
            background: linear-gradient(135deg, #FF8F50, #FF5E62); 
            border-radius: 16px; 
            display: flex; justify-content: center; align-items: center; 
            color: white; font-weight: 800; font-size: 1.2rem; 
            box-shadow: 0 8px 20px rgba(255, 143, 80, 0.25); 
            transform: rotate(-5deg); transition: 0.3s; cursor: pointer; 
            overflow: hidden;
            border: 2px solid var(--border-panel); /* Thêm viền avatar cho đẹp */
        }
        .user-avatar:hover { transform: rotate(0deg) scale(1.05); }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>

    <div class="background-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

        <div id="classrooms-grid" class="class-grid">

    </main>

    <div id="join-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="close-btn" onclick="closeJoinModal()"><i class="fas fa-times"></i></div>
            
            <div class="w-16 h-16 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl text-orange-500 shadow-sm border border-orange-100">
                <i class="fas fa-ticket-alt transform -rotate-12"></i>
            </div>
            <h2 class="text-2xl font-black text-gray-800">Nhập Mã Lớp</h2>
            <p class="text-gray-500 text-sm mt-1">Mã lớp gồm 6 ký tự do giáo viên cung cấp.</p>

            <form id="join-form">
                <div class="relative">
                    <input type="text" id="class-code" class="code-input" placeholder="NHẬP MÃ" maxlength="6" autocomplete="off">
                    <div id="loader" class="absolute right-4 top-1/2 -translate-y-1/2 text-orange-500 hidden mt-3">
                        <i class="fas fa-circle-notch fa-spin"></i>
                    </div>
                </div>

                <div id="preview-box" class="preview-box">
                    <img id="preview-img" src="" class="preview-avatar">
                    <div class="flex-1 overflow-hidden">
                        <h4 id="preview-name" class="font-bold text-gray-800 text-base truncate">...</h4>
                        <div class="flex items-center justify-between mt-1">
                            <span id="preview-teacher" class="text-xs text-gray-500 font-bold truncate">...</span>
                            <span class="text-[10px] bg-orange-200 text-orange-800 px-2 py-0.5 rounded font-bold">MỚI</span>
                        </div>
                    </div>
                </div>

                <div id="error-msg" class="text-red-500 text-sm font-bold mt-4 hidden">
                    <i class="fas fa-exclamation-triangle mr-1"></i> <span id="error-text">Mã không hợp lệ</span>
                </div>

                <button type="submit" id="btn-submit" class="btn-confirm-join" disabled>
                    Xác Nhận Tham Gia
                </button>
            </form>
        </div>
    </div>

    <div id="toast"><i class="fas fa-check-circle text-green-500"></i> <span id="toast-msg">Thông báo</span></div>
    <script type="module" src="/check-maintenance.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, updateDoc, arrayUnion, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { initMenu } from "./menu.js";
        import { initHeader } from './header.js'; // Sửa lại đường dẫn /js/ cho chuẩn với source của bạn
        
        // Kích hoạt Header
        initHeader('hopvan-header-container');
        const firebaseConfig = { apiKey: "AIzaSyAJ9C2biYeiLPmhakzLZ4mEqfO9_VgPSZE", authDomain: "hopvan-9a648.firebaseapp.com", projectId: "hopvan-9a648", storageBucket: "hopvan-9a648.appspot.com", messagingSenderId: "429347196227", appId: "1:429347196227:web:917b8d019f0efd0f7833f6", measurementId: "G-1BG8PSRG0R" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        initMenu(app, 'classrooms');

        // State
        let currentUser = null;
        let foundClass = null;

        // --- UI Functions ---
        window.toggleSidebar = () => {
            const sidebar = document.querySelector('aside');
            const overlay = document.getElementById('sidebar-overlay');
            if(sidebar && overlay) {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            }
        };

        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            if(type === 'error') t.querySelector('i').className = 'fas fa-exclamation-circle text-red-500';
            else t.querySelector('i').className = 'fas fa-check-circle text-green-500';
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }

        // --- Modal Logic ---
        window.openJoinModal = () => {
            document.getElementById('join-modal').classList.add('open');
            document.getElementById('class-code').focus();
        };
        
        window.closeJoinModal = () => {
            document.getElementById('join-modal').classList.remove('open');
            // Reset form
            document.getElementById('class-code').value = '';
            document.getElementById('preview-box').classList.remove('active');
            document.getElementById('error-msg').classList.add('hidden');
            document.getElementById('btn-submit').disabled = true;
            foundClass = null;
        };

        // --- Auth & Initial Load ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;

                const userDoc = await getDoc(doc(db, "users", user.uid));
                let avatarHTML = name.charAt(0).toUpperCase(); 

                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    
                    // --- THÊM 6 DÒNG ĐỒNG BỘ DARK MODE ---
                    if (userData.theme) {
                        localStorage.setItem('theme', userData.theme);
                        if (userData.theme === 'dark') document.documentElement.classList.add('dark');
                        else document.documentElement.classList.remove('dark');
                    }

                    // Ưu tiên Avatar tùy chỉnh > Avatar Google > Chữ cái
                    if (userData.customAvatar) {
                        avatarHTML = `<img src="${userData.customAvatar}" alt="User">`;
                        document.getElementById('avatar-initial').style.background = 'transparent'; // Xóa nền cam nếu có ảnh
                    } else if (userData.photoURL || user.photoURL) {
                        avatarHTML = `<img src="${userData.photoURL || user.photoURL}" alt="User">`;
                        document.getElementById('avatar-initial').style.background = 'transparent';
                    }
                }
                document.getElementById('avatar-initial').innerHTML = avatarHTML;

                // --- 2. TẢI LỚP HỌC (GIỮ NGUYÊN) ---
                loadClassrooms(user.uid);
            } else {
                window.location.href = "../log.html";
            }
        });

        async function loadClassrooms(uid) {
            try {
                const q = query(collection(db, "classrooms"), where("students", "array-contains", uid));
                const snapshot = await getDocs(q);
                const grid = document.getElementById('classrooms-grid');

                if (snapshot.empty) {
                    grid.innerHTML = `
                        <div class="col-span-full flex flex-col items-center justify-center py-16 bg-white/50 rounded-3xl border-2 border-dashed border-gray-200">
                            <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center text-3xl text-gray-400 mb-4"><i class="fas fa-chalkboard"></i></div>
                            <h3 class="text-xl font-black text-gray-600">Chưa có lớp học nào</h3>
                            <button onclick="openJoinModal()" class="mt-4 text-orange-500 font-bold hover:underline">Tham gia ngay</button>
                        </div>`;
                    return;
                }

                // Batch Fetch Teacher Info
                const classrooms = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                const teacherIds = [...new Set(classrooms.map(c => c.teacherId))];
                const teachersMap = {};
                
                for (const tid of teacherIds) {
                     const tSnap = await getDoc(doc(db, "users", tid));
                     if (tSnap.exists()) teachersMap[tid] = tSnap.data().name;
                }

                grid.innerHTML = classrooms.map(c => {
                    const teacherName = teachersMap[c.teacherId] || "Giáo viên";
                    const subject = c.subjectName || "Ngữ Văn";
                    return `
                    <div class="class-card group">
                        <div class="class-badge">${subject} - Khối ${c.grade}</div>
                        <h3 class="class-title">${c.className}</h3>
                        <div class="class-teacher"><i class="fas fa-chalkboard-teacher text-orange-400"></i> <span>GV: ${teacherName}</span></div>
                        <a href="classroom-view.html?classId=${c.id}" class="btn-enter">Vào Lớp Học <i class="fas fa-arrow-right ml-1"></i></a>
                        <i class="fas fa-book-open absolute -bottom-4 -right-4 text-8xl text-gray-100 opacity-20 transform -rotate-12 group-hover:rotate-0 group-hover:scale-110 transition duration-500 pointer-events-none"></i>
                    </div>`;
                }).join('');
                feather.replace();

            } catch (error) {
                console.error(error);
                showToast("Lỗi tải lớp.", "error");
            }
        }

        // --- Join Class Logic ---
        const input = document.getElementById('class-code');
        input.addEventListener('input', (e) => {
            let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            e.target.value = val;
            
            document.getElementById('error-msg').classList.add('hidden');
            document.getElementById('preview-box').classList.remove('active');
            document.getElementById('btn-submit').disabled = true;
            foundClass = null;

            if (val.length === 6) checkCode(val);
        });

        async function checkCode(code) {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const q = query(collection(db, "classrooms"), where("classCode", "==", code));
                const snap = await getDocs(q);
                document.getElementById('loader').classList.add('hidden');

                if (snap.empty) {
                    document.getElementById('error-text').innerText = "Mã lớp không tồn tại.";
                    document.getElementById('error-msg').classList.remove('hidden');
                    return;
                }

                const docData = snap.docs[0].data();
                foundClass = { id: snap.docs[0].id, ...docData };

                // Get Teacher
                let tName = "Giáo viên";
                let tAvt = "https://placehold.co/50x50/FF8F50/ffffff?text=T";
                if(foundClass.teacherId) {
                    const tSnap = await getDoc(doc(db, "users", foundClass.teacherId));
                    if(tSnap.exists()) {
                        tName = tSnap.data().name;
                        if(tSnap.data().photoURL || tSnap.data().customAvatar) tAvt = tSnap.data().customAvatar || tSnap.data().photoURL;
                        else tAvt = `https://placehold.co/50x50/FF8F50/ffffff?text=${tName.charAt(0)}`;
                    }
                }

                document.getElementById('preview-name').innerText = foundClass.className;
                document.getElementById('preview-teacher').innerText = tName;
                document.getElementById('preview-img').src = tAvt;
                document.getElementById('preview-box').classList.add('active');
                document.getElementById('btn-submit').disabled = false;

            } catch(e) { document.getElementById('loader').classList.add('hidden'); }
        }

        document.getElementById('join-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!foundClass || !currentUser) return;

            if (foundClass.students && foundClass.students.includes(currentUser.uid)) {
                showToast("Bạn đã ở trong lớp này rồi!", "error");
                return;
            }

            const btn = document.getElementById('btn-submit');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>'; btn.disabled = true;

            try {
                const batch = writeBatch(db);
                const classRef = doc(db, "classrooms", foundClass.id);
                batch.update(classRef, { students: arrayUnion(currentUser.uid) });
                const userRef = doc(db, "users", currentUser.uid);
                batch.update(userRef, { joinedClassrooms: arrayUnion(foundClass.id) });
                await batch.commit();

                showToast("Tham gia thành công!");
                closeJoinModal();
                loadClassrooms(currentUser.uid); // Refresh list immediately

            } catch (error) {
                showToast("Lỗi khi tham gia.", "error");
                btn.innerHTML = 'Xác Nhận Tham Gia';
                btn.disabled = false;
            }
        });
        
        feather.replace();
    </script>

<script type="text/javascript">
    // 1. Chặn Chuột phải (Để ẩn menu "Inspect/Kiểm tra" và "View Source/Xem nguồn")
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        // Không hiện thông báo gì cả để trải nghiệm mượt mà hơn
    });

    // 2. Chặn các phím tắt Developer Tools
    document.addEventListener('keydown', function(e) {
        // Chặn F12
        if (e.key === 'F12' || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }

        // Chặn các tổ hợp phím Ctrl + ...
        if (e.ctrlKey) {
            switch (e.key.toLowerCase()) {
                case 'u': // Chặn Ctrl + U (Xem source code)
                case 's': // Chặn Ctrl + S (Lưu trang web)
                case 'p': // Chặn Ctrl + P (In trang web - thường hiện code)
                // Lưu ý: KHÔNG chặn 'c' (Copy) và 'a' (Select All)
                    e.preventDefault();
                    return false;
            }

            // Chặn Ctrl + Shift + ... (Các phím mở DevTools)
            if (e.shiftKey) {
                switch (e.key.toLowerCase()) {
                    case 'i': // Inspect Element
                    case 'j': // Console
                    case 'c': // Element Inspector
                        e.preventDefault();
                        return false;
                }
            }
        }
    });
</script>
