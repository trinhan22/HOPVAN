<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tham Gia Lớp Học - HopVan</title>
    <meta property="og:title" content="HOPVAN - Nền Tảng Học & Luyện Thi Ngữ Văn" />
    <meta property="og:description" content="Nền tảng học tập Ngữ Văn tích hợp AI – hỗ trợ tự học thông minh, phân tích tác phẩm, luyện viết hiệu quả." />
    <meta property="og:image" content="https://hopvan.netlify.app/panel.webp" />
    <meta property="og:url" content="https://hopvan.netlify.app" />
    <meta property="og:type" content="article" />
    <link rel="icon" type="image/webp" href="../LOGO.WEBP" />
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --primary: #FF8F50;
            --primary-gradient: linear-gradient(135deg, #FF8F50, #FF5E62);
            --bg-glass: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --blur: 25px;
            --sidebar-width: 260px;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FFF5EC; height: 100vh; overflow: hidden; display: flex; }

        /* --- BACKGROUND --- */
        .background-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: floatBlob 10s infinite alternate; }
        .blob-1 { width: 500px; height: 500px; background: #FCA96A; top: -100px; left: -100px; }
        .blob-2 { width: 400px; height: 400px; background: #FCD5B5; bottom: -50px; right: -50px; animation-delay: -5s; }
        @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }

        /* --- LAYOUT --- */
        .mobile-header { display: none; position: fixed; top: 0; left: 0; right: 0; height: 60px; background: white; z-index: 100; align-items: center; padding: 0 20px; border-bottom: 1px solid #eee; }
        #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); z-index: 998; }

        .main-content {
            margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); height: 100%;
            background: var(--bg-glass); backdrop-filter: blur(var(--blur)); border-left: 1px solid var(--glass-border);
            padding: 40px; overflow-y: auto; position: relative; 
            display: flex; align-items: center; justify-content: center; /* Căn giữa nội dung */
        }

        /* --- JOIN CARD (Giao diện chính) --- */
        .join-panel {
            background: rgba(255, 255, 255, 0.95); border-radius: 32px; padding: 50px;
            width: 100%; max-width: 480px; text-align: center;
            box-shadow: 0 25px 60px rgba(255, 143, 80, 0.2); border: 1px solid white;
            position: relative; overflow: hidden;
            transform: translateY(-20px); animation: fadeInUp 0.5s ease-out forwards;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .icon-circle {
            width: 80px; height: 80px; background: #fff7ed; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;
            color: var(--primary); font-size: 2.2rem; box-shadow: 0 10px 20px rgba(255, 143, 80, 0.15);
            border: 2px solid white;
        }

        .code-input-wrapper { position: relative; margin-bottom: 20px; }
        
        .code-input {
            width: 100%; padding: 22px; font-size: 1.8rem; text-align: center; letter-spacing: 0.3em;
            font-weight: 900; color: #2D3436; background: #f8fafc; border: 2px solid #e2e8f0;
            border-radius: 20px; outline: none; transition: all 0.3s; text-transform: uppercase;
        }
        .code-input:focus { 
            border-color: var(--primary); background: white; 
            box-shadow: 0 0 0 6px rgba(255, 143, 80, 0.1); 
            transform: scale(1.02);
        }
        .code-input::placeholder { color: #cbd5e1; letter-spacing: 2px; font-size: 1.2rem; font-weight: 600; }

        .btn-join {
            width: 100%; padding: 18px; margin-top: 25px; background: var(--primary-gradient);
            color: white; font-weight: 800; border-radius: 18px; font-size: 1rem;
            transition: all 0.3s; box-shadow: 0 12px 30px rgba(255, 94, 98, 0.35);
            display: flex; align-items: center; justify-content: center; gap: 10px; border: none; cursor: pointer;
        }
        .btn-join:hover:not(:disabled) { transform: translateY(-4px); box-shadow: 0 18px 40px rgba(255, 94, 98, 0.45); }
        .btn-join:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; background: #cbd5e1; }

        /* --- PREVIEW BOX (Thẻ lớp học hiện ra khi tìm thấy) --- */
        .class-preview {
            margin-top: 25px; padding: 20px; background: white; border-radius: 20px;
            border: 2px dashed #FF8F50; text-align: left; 
            display: none; /* Hidden by default */
            animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            align-items: center; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .class-preview.active { display: flex; }
        
        .preview-avatar { 
            width: 55px; height: 55px; background: #f1f5f9; border-radius: 16px; 
            object-fit: cover; flex-shrink: 0; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .back-btn {
            position: absolute; top: 40px; left: 40px; 
            width: 45px; height: 45px; border-radius: 14px; background: white;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .back-btn:hover { color: var(--primary); transform: translateX(-3px); }

        /* --- TOAST --- */
        #toast { position: fixed; top: 30px; right: 30px; background: white; padding: 15px 25px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 10px; z-index: 10000; transform: translateX(200%); transition: 0.5s; }
        #toast.show { transform: translateX(0); }

        /* Mobile */
        @media (max-width: 768px) {
            aside { display: none; }
            .mobile-header { display: flex; }
            .main-content { margin-left: 0; width: 100%; padding: 80px 20px; border-left: none; align-items: flex-start; }
            .join-panel { padding: 30px 25px; margin-top: 20px; }
            .back-btn { display: none; }
        }

        /* --- GLOBAL SCROLLBAR --- */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255, 143, 80, 0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background-color: rgba(255, 143, 80, 0.3); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; transition: background-color 0.3s ease; }
        ::-webkit-scrollbar-thumb:hover { background-color: #FF8F50; border: 1px solid transparent; }
        ::-webkit-scrollbar-button { display: none; }
    </style>
</head>
<body>

    <div class="background-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

    <div class="mobile-header lg:hidden">
        <button onclick="toggleSidebar()" class="text-orange-500 text-2xl mr-4 focus:outline-none"><i class="fas fa-bars"></i></button>
        <div class="flex items-center gap-2"><img src="../LOGO.WEBP" alt="Logo" class="w-8 h-8"><span class="font-black text-orange-500 text-lg">HOPVAN</span></div>
    </div>
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="menu-placeholder"></div>

    <main class="main-content">
        
        <a href="classrooms.html" class="back-btn" title="Quay lại danh sách lớp">
            <i class="fas fa-arrow-left text-lg"></i>
        </a>

        <div class="join-panel">
            <div class="icon-circle">
                <i class="fas fa-ticket-alt transform -rotate-12"></i>
            </div>
            
            <h1 class="text-3xl font-black text-gray-800 mb-2">Tham Gia Lớp Học</h1>
            <p class="text-gray-500 text-sm mb-8 px-4">Nhập mã lớp (6 ký tự) do giáo viên cung cấp để bắt đầu hành trình học tập.</p>

            <form id="join-form">
                <div class="code-input-wrapper">
                    <input type="text" id="class-code" class="code-input" placeholder="NHẬP MÃ" maxlength="6" autocomplete="off">
                    
                    <div id="loader" class="absolute right-5 top-1/2 -translate-y-1/2 text-orange-500 hidden">
                        <i class="fas fa-circle-notch fa-spin text-xl"></i>
                    </div>
                </div>

                <div id="preview-box" class="class-preview">
                    <img id="preview-img" src="" class="preview-avatar">
                    <div class="flex-1">
                        <h4 id="preview-name" class="font-bold text-gray-800 text-lg leading-tight line-clamp-1">...</h4>
                        <div class="flex items-center justify-between mt-1">
                            <p class="text-xs text-gray-500 font-bold flex items-center">
                                <i class="fas fa-chalkboard-teacher text-orange-400 mr-1.5"></i> <span id="preview-teacher">...</span>
                            </p>
                            <span class="text-[10px] bg-orange-100 text-orange-600 px-2 py-0.5 rounded font-bold uppercase" id="preview-subject">Ngữ Văn</span>
                        </div>
                    </div>
                    <i class="fas fa-check-circle text-green-500 text-xl"></i>
                </div>

                <div id="error-msg" class="text-red-500 text-sm font-bold mt-4 hidden bg-red-50 py-2 px-4 rounded-xl border border-red-100 flex items-center justify-center gap-2">
                    <i class="fas fa-exclamation-circle"></i> <span id="error-text">Mã lớp không tồn tại</span>
                </div>

                <button type="submit" id="btn-submit" class="btn-join" disabled>
                    Xác Nhận Tham Gia <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>

    </main>

    <div id="toast"><i class="fas fa-check-circle text-green-500"></i> <span id="toast-msg">Thông báo</span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, updateDoc, arrayUnion, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // Import Menu
        import { initMenu } from "./menu.js";

        const firebaseConfig = { apiKey: "AIzaSyAJ9C2biYeiLPmhakzLZ4mEqfO9_VgPSZE", authDomain: "hopvan-9a648.firebaseapp.com", projectId: "hopvan-9a648", storageBucket: "hopvan-9a648.appspot.com", messagingSenderId: "429347196227", appId: "1:429347196227:web:917b8d019f0efd0f7833f6", measurementId: "G-1BG8PSRG0R" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // QUAN TRỌNG: Highlight đúng menu "Lớp học của tôi"
        initMenu(app, 'classrooms');

        // State
        let currentUser = null;
        let foundClass = null;

        // UI Helpers
        window.toggleSidebar = () => {
            const sidebar = document.querySelector('aside');
            const overlay = document.getElementById('sidebar-overlay');
            if(sidebar && overlay) { sidebar.classList.toggle('open'); overlay.classList.toggle('active'); }
        };

        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            if(type === 'error') t.querySelector('i').className = 'fas fa-exclamation-circle text-red-500';
            else t.querySelector('i').className = 'fas fa-check-circle text-green-500';
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Auth
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                // Check URL param if redirected
                const params = new URLSearchParams(window.location.search);
                const code = params.get('code');
                if(code) {
                    document.getElementById('class-code').value = code.toUpperCase();
                    checkCode(code.toUpperCase());
                }
            } else {
                // Save redirect code
                const params = new URLSearchParams(window.location.search);
                const code = params.get('code');
                if(code) sessionStorage.setItem("pendingClassCode", code);
                window.location.href = '../log.html';
            }
        });

        // Input Logic (Debounce & Format)
        const input = document.getElementById('class-code');
        input.addEventListener('input', (e) => {
            let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, ''); // Chỉ cho phép chữ và số
            e.target.value = val;
            
            document.getElementById('error-msg').classList.add('hidden');
            document.getElementById('preview-box').classList.remove('active');
            document.getElementById('btn-submit').disabled = true;
            foundClass = null;

            if (val.length === 6) {
                checkCode(val);
            }
        });

        async function checkCode(code) {
            document.getElementById('loader').classList.remove('hidden');
            
            try {
                const q = query(collection(db, "classrooms"), where("classCode", "==", code));
                const snap = await getDocs(q);

                document.getElementById('loader').classList.add('hidden');

                if (snap.empty) {
                    document.getElementById('error-text').innerText = "Mã lớp không tồn tại hoặc đã bị khóa.";
                    document.getElementById('error-msg').classList.remove('hidden');
                    return;
                }

                const docData = snap.docs[0].data();
                foundClass = { id: snap.docs[0].id, ...docData };

                // Get Teacher Info
                let teacherName = "Giáo viên";
                let teacherAvatar = "https://placehold.co/55x55/FF8F50/ffffff?text=T";

                if (foundClass.teacherId) {
                    const tSnap = await getDoc(doc(db, "users", foundClass.teacherId));
                    if (tSnap.exists()) {
                        const tData = tSnap.data();
                        teacherName = tData.name;
                        if (tData.photoURL || tData.customAvatar) teacherAvatar = tData.customAvatar || tData.photoURL;
                        else teacherAvatar = `https://placehold.co/55x55/FF8F50/ffffff?text=${tData.name.charAt(0)}`;
                    }
                }

                // Show Preview Card
                document.getElementById('preview-name').innerText = foundClass.className;
                document.getElementById('preview-teacher').innerText = teacherName;
                document.getElementById('preview-subject').innerText = foundClass.subjectName || "Lớp Học";
                document.getElementById('preview-img').src = teacherAvatar;
                
                document.getElementById('preview-box').classList.add('active');
                document.getElementById('btn-submit').disabled = false; // Enable button

            } catch (err) {
                console.error(err);
                document.getElementById('loader').classList.add('hidden');
                showToast("Lỗi kết nối server.", "error");
            }
        }

        // Join Logic
        document.getElementById('join-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!foundClass || !currentUser) return;

            // Check if already joined
            if (foundClass.students && foundClass.students.includes(currentUser.uid)) {
                showToast("Bạn đã là thành viên của lớp này!", "error");
                setTimeout(() => window.location.href = 'classrooms.html', 1500);
                return;
            }

            const btn = document.getElementById('btn-submit');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Đang xử lý...';
            btn.disabled = true;

            try {
                const batch = writeBatch(db);
                
                // 1. Thêm học sinh vào danh sách lớp
                const classRef = doc(db, "classrooms", foundClass.id);
                batch.update(classRef, { students: arrayUnion(currentUser.uid) });

                // 2. Thêm lớp vào danh sách của học sinh (Để query nhanh hơn sau này)
                const userRef = doc(db, "users", currentUser.uid);
                batch.update(userRef, { joinedClassrooms: arrayUnion(foundClass.id) });

                await batch.commit();

                showToast("Tham gia thành công! Đang vào lớp...", "success");
                
                // Chuyển hướng sau 1.5s
                setTimeout(() => window.location.href = `classroom-view.html?classId=${foundClass.id}`, 1500);

            } catch (error) {
                console.error(error);
                showToast("Có lỗi xảy ra. Vui lòng thử lại.", "error");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

    </script>

<script type="text/javascript">
    // 1. Chặn Chuột phải (Để ẩn menu "Inspect/Kiểm tra" và "View Source/Xem nguồn")
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        // Không hiện thông báo gì cả để trải nghiệm mượt mà hơn
    });

    // 2. Chặn các phím tắt Developer Tools
    document.addEventListener('keydown', function(e) {
        // Chặn F12
        if (e.key === 'F12' || e.keyCode === 123) {
            e.preventDefault();
            return false;
        }

        // Chặn các tổ hợp phím Ctrl + ...
        if (e.ctrlKey) {
            switch (e.key.toLowerCase()) {
                case 'u': // Chặn Ctrl + U (Xem source code)
                case 's': // Chặn Ctrl + S (Lưu trang web)
                case 'p': // Chặn Ctrl + P (In trang web - thường hiện code)
                // Lưu ý: KHÔNG chặn 'c' (Copy) và 'a' (Select All)
                    e.preventDefault();
                    return false;
            }

            // Chặn Ctrl + Shift + ... (Các phím mở DevTools)
            if (e.shiftKey) {
                switch (e.key.toLowerCase()) {
                    case 'i': // Inspect Element
                    case 'j': // Console
                    case 'c': // Element Inspector
                        e.preventDefault();
                        return false;
                }
            }
        }
    });
</script>
</body>
</html>
