<html lang="vi" class="scroll-smooth">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HopVan - Tác Phẩm Văn Học</title>
    
    <meta property="og:title" content="HOPVAN - Nền Tảng Học & Luyện Thi Ngữ Văn" />

    <meta property="og:image" content="https://hopvan.info.vn/panel.webp" />
    <meta property="og:url" content="https://hopvan.info.vn" />

    <link rel="icon" href="https://hopvan.info.vn/LOGO.WEBP" />

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --primary: #FF8F50;
            --primary-gradient: linear-gradient(135deg, #FF8F50, #FF5E62);
            --text-main: #2D3436;
            --text-light: #636E72;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --blur: 25px;
            --sidebar-width: 280px;

            /* Book Shadows */
            --shadow-book: 5px 5px 15px rgba(0,0,0,0.08), -1px 0 2px rgba(0,0,0,0.03);
            --shadow-book-hover: 10px 15px 25px rgba(255, 143, 80, 0.2), -1px 0 2px rgba(0,0,0,0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        body { background-color: #FFF5EC; height: 100vh; overflow: hidden; display: flex; }

        /* --- BACKGROUND --- */
        .background-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: floatBlob 10s infinite alternate; }
        .blob-1 { width: 500px; height: 500px; background: #FCA96A; top: -100px; left: -100px; }
        .blob-2 { width: 400px; height: 400px; background: #FCD5B5; bottom: -50px; right: -50px; animation-delay: -5s; }
        .blob-3 { width: 300px; height: 300px; background: #FFD1D1; top: 40%; left: 40%; animation-delay: -2s; }
        @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }

        /* --- MOBILE HEADER & OVERLAY --- */
        .mobile-header {
            display: none; position: fixed; top: 0; left: 0; right: 0;
            height: 60px; background: white; z-index: 100;
            align-items: center; padding: 0 20px; border-bottom: 1px solid #eee;
        }
        #sidebar-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
            z-index: 998;
        }

        /* --- BỐ CỤC CHÍNH ĐỒNG BỘ DASHBOARD --- */
        .main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur));
            border-left: 1px solid var(--glass-border);
            padding: 30px 40px;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            -webkit-overflow-scrolling: touch;
        }

        .content-wrapper {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto; 
        }

        /* HEADER */
        .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; position: relative; z-index: 10;}
        .welcome-text h2 { font-size: 2.2rem; font-weight: 800; color: var(--text-main); font-family: 'Plus Jakarta Sans', serif; letter-spacing: -0.5px;}
        .welcome-text p { color: var(--text-light); font-weight: 500; font-size: 1rem; margin-top: 5px; }

        /* --- FILTER BAR (DẠNG CARD) --- */
        .filter-card {
            background: rgba(255, 255, 255, 0.85); padding: 20px 25px; border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 1); display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 35px; gap: 20px;
        }
        .filter-card:hover { transform: translateY(-3px); background: white; box-shadow: 0 20px 40px rgba(255, 143, 80, 0.1); border-color: var(--primary); }

        .search-box { position: relative; width: 300px; flex-shrink: 0; }
        .search-box input {
            width: 100%; padding: 12px 20px 12px 45px; border-radius: 12px;
            border: 2px solid #e2e8f0; background: #f8fafc;
            color: var(--text-main); font-size: 0.95rem; font-weight: 600; outline: none; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(255,143,80,0.1); }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #94a3b8; }

        .filter-pills { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px;}
        .filter-pills::-webkit-scrollbar { display: none; }
        .pill-btn {
            padding: 8px 18px; border-radius: 10px; font-size: 0.85rem; font-weight: 700;
            background: transparent; color: var(--text-light); border: 1px solid transparent;
            cursor: pointer; transition: all 0.2s ease; white-space: nowrap;
        }
        .pill-btn:hover { background: #f1f5f9; color: var(--text-main); }
        .pill-btn.active { background: var(--primary-gradient); color: white; box-shadow: 0 4px 10px rgba(255,143,80,0.3); }

        /* --- BOOK GRID --- */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 40px 30px;
        }

        .book-card { display: flex; flex-direction: column; cursor: pointer; perspective: 1000px; }
        
        .book-cover-container {
            position: relative; width: 100%; aspect-ratio: 2 / 3;
            border-radius: 4px 12px 12px 4px; overflow: hidden;
            box-shadow: var(--shadow-book); transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            background: #e2e8f0; transform-style: preserve-3d;
        }

        /* Gáy sách */
        .book-cover-container::after {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5%;
            background: linear-gradient(to right, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 100%);
            border-left: 1px solid rgba(0,0,0,0.1); z-index: 5; mix-blend-mode: overlay; pointer-events: none;
        }
        .book-cover-container::before {
            content: ''; position: absolute; left: 5%; top: 0; bottom: 0; width: 2px;
            background: rgba(0,0,0,0.1); z-index: 6; pointer-events: none;
        }

        .book-cover-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s ease; z-index: 1; position: relative;}
        
        /* Bìa mặc định */
        .book-cover-placeholder {
            width: 100%; height: 100%; background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center; position: relative; z-index: 1; border: 1px solid rgba(255,255,255,0.1);
        }
        .book-cover-placeholder::before { content: ''; position: absolute; inset: 10px; border: 1px solid rgba(255,255,255,0.15); pointer-events: none;}
        .placeholder-title { font-family: 'Merriweather', serif; color: white; font-weight: 700; font-size: 1.1rem; line-height: 1.4; margin-bottom: 10px;}
        .placeholder-author { color: #cbd5e1; font-size: 0.8rem; font-style: italic; }

        .book-card:hover .book-cover-container { transform: translateY(-10px) rotateY(-3deg); box-shadow: var(--shadow-book-hover); }
        .book-card:hover .book-cover-img { transform: scale(1.05); }

        .read-action-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 20px;
            opacity: 0; transition: all 0.4s ease; z-index: 10;
        }
        .book-card:hover .read-action-overlay { opacity: 1; }

        .btn-read-sm {
            background: white; color: var(--primary); font-weight: 800; font-size: 0.75rem;
            padding: 8px 20px; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.5px;
            transform: translateY(20px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 6px; border: none; cursor: pointer;
        }
        .book-card:hover .btn-read-sm { transform: translateY(0); }

        .book-info { margin-top: 15px; }
        .book-title { font-family: 'Merriweather', serif; font-size: 1.05rem; font-weight: 800; color: var(--text-main); margin-bottom: 4px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: color 0.3s;}
        .book-card:hover .book-title { color: var(--primary); }
        .book-author { font-size: 0.8rem; color: var(--text-light); font-weight: 600; }
        
        .book-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .tag { font-size: 0.65rem; font-weight: 800; padding: 4px 8px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
        .tag-grade { background: #f1f5f9; color: #475569; }
        .tag-genre { background: rgba(255,143,80,0.1); color: var(--primary); }

        /* --- DARK MODE --- */
        html.dark { --bg-body: #0B1120; --bg-card: #111827; --border-ui: #1F2937; --text-main: #F8FAFC; --text-light: #94A3B8; --bg-hover: #1e293b;}
        html.dark body { background-color: var(--bg-body) !important; }
        html.dark .main-content { background-color: var(--bg-body) !important; backdrop-filter: none !important; border-left: 1px solid var(--border-ui) !important; }
        html.dark .blob { opacity: 0.1 !important; }
        html.dark .filter-card { background: var(--bg-card); border-color: var(--border-ui); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        html.dark .search-box input { background: #1e293b; border-color: #334155;}
        html.dark .pill-btn:hover { background: #334155; }
        html.dark .tag-grade { background: #334155; color: #cbd5e1; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            body { height: auto; overflow: auto; }
            .mobile-header { display: flex; }
            .main-content { margin-left: 0 !important; width: 100% !important; padding: 85px 20px 40px !important; height: auto !important; border-left: none; }
            .user-header { margin-bottom: 20px; }
            .welcome-text h2 { font-size: 1.8rem; }
            
            .filter-card { flex-direction: column; align-items: stretch; padding: 15px; border-radius: 20px; gap: 15px; margin-bottom: 25px;}
            .search-box { width: 100%; }
            .book-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 30px 15px; }
            .book-title { font-size: 0.95rem; }
            
            #menu-placeholder aside {
                position: fixed !important; left: 0 !important; top: 0 !important; bottom: 0 !important;
                transform: translateX(-100%); z-index: 9999 !important; width: 280px !important; 
                transition: transform 0.3s ease-in-out !important;
            }
            #menu-placeholder aside.open { transform: translateX(0) !important; box-shadow: 10px 0 50px rgba(0,0,0,0.5) !important; }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255, 143, 80, 0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background-color: rgba(255, 143, 80, 0.3); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; transition: background-color 0.3s ease; }
        ::-webkit-scrollbar-thumb:hover { background-color: var(--primary); border: 1px solid transparent; }
    </style>
</head>
<body>

        <div class="content-wrapper">
            
            <div class="user-header">

            <div class="filter-card">

            </div>

        </div>
    </main>

    <script type="module" src="gam.js"></script>
    <script src="../chatbot.js"></script>
    
    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { initMenu } from "./menu.js";

        // Cấu hình Firebase (Chống lỗi duplicate app)
        const firebaseConfig = { apiKey: "AIzaSyAJ9C2biYeiLPmhakzLZ4mEqfO9_VgPSZE", authDomain: "hopvan-9a648.firebaseapp.com", projectId: "hopvan-9a648", storageBucket: "hopvan-9a648.appspot.com", messagingSenderId: "429347196227", appId: "1:429347196227:web:917b8d019f0efd0f7833f6" };
        const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
        const auth = getAuth(app);
        
        // Khởi tạo menu 
        initMenu(app, 'tacpham');

        // Bắt buộc kiểm tra đăng nhập để hệ thống hoạt động ổn định
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "../log.html";
            }
        });

        // Hàm mở/đóng sidebar trên Mobile
        window.toggleSidebar = () => {
            const sidebar = document.querySelector('aside');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar) sidebar.classList.toggle('open');
            if (overlay) overlay.classList.toggle('active');
        };

        // ==========================================
        // DỮ LIỆU TÁC PHẨM (MOCK DATA)
        // ==========================================
        const booksData = [
            { id: "truyen-kieu", title: "Truyện Kiều", author: "Nguyễn Du", cover: "https://www.nxbtre.com.vn/Images/Book/NXBTreStoryFull_03462015_104616.jpg", grade: "Lớp 12", genre: "Truyện Thơ" },
            { id: "luc-van-tien", title: "Lục Vân Tiên", author: "Nguyễn Đình Chiểu", cover: "https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1540993420i/42598061.jpg", grade: "Lớp 12", genre: "Truyện Thơ" },
            { id: "van-te-nghia-si-can-giuoc", title: "Văn Tế Nghĩa Sĩ Cần Giuộc", author: "Nguyễn Đình Chiểu", cover: "https://gcs.tripi.vn/public-tripi/tripi-feed/img/486480ioZ/anh-mo-ta.png", grade: "Lớp 12", genre: "Văn Tế" },
            { id: "song", title: "Sóng", author: "Xuân Quỳnh", cover: "https://khongthichmavanphaihocvan.wordpress.com/wp-content/uploads/2021/09/song.png?w=640", grade: "Lớp 12", genre: "Thơ" },
            { id: "tay-tien", title: "Tây Tiến", author: "Quang Dũng", cover: "https://images.hcmcpv.org.vn/res/news/2019/09/05-09-2019-ra-mat-hoi-ky-doan-binh-tay-tien-cua-nha-tho-quang-dung-7DFD4D6B.jpg", grade: "Lớp 12", genre: "Thơ" },
            { id: "binh-ngo-dai-cao", title: "Bình Ngô Đại Cáo", author: "Nguyễn Trãi", cover: "https://isach.info/images/story/cover/binh_ngo_dai_cao__nguyen_trai.jpg", grade: "Lớp 12", genre: "Thơ" },
            { id: "nam-quoc-son-ha", title: "Nam Quốc Sơn Hà", author: "Lý Thường Kiệt", cover: "https://dinhnghia.vn/ckfinder/userfiles/images/nam-quoc-son-ha-ly-thuong-kiet-2.png", grade: "Lớp 12", genre: "Thơ" },
            { id: "nu-than-mat-troi-va-mat-trang", title: "Nữ Thần Mặt Trời Và Mặt Trăng", author: "Khuyết Danh", cover: "https://st.download.vn/data/image/2022/11/21/Mat-troi.jpg", grade: "Lớp 12", genre: "Thần Thoại" },
            { id: "thanh-giong", title: "Thánh Gióng", author: "Lê Thánh Tông", cover: "https://thuvien.hanoiacademy.edu.vn/wp-content/uploads/2025/04/download-1-99.jpg", grade: "Lớp 12", genre: "Thơ" },
            { id: "thi-mau", title: "Thị Mầu", author: "Vương Trọng", cover: "https://media-cdn-v2.laodong.vn/Storage/NewsPortal/2023/3/25/1171721/Thi-Mau-La-Ai.jpg", grade: "Lớp 12", genre: "Thơ" },
            { id: "tuyen-ngon-doc-lap", title: "Tuyên Ngôn Độc Lập", author: "Hồ Chí Minh", cover: "https://media.vov.vn/sites/default/files/styles/large/public/2023-09/bac_ho_2.jpeg.jpg", grade: "Lớp 12", genre: "Chính Luận" },
            { id: "tien-dan-nguoi-yeu", title: "Tiễn Dặn Người Yêu", author: "Khuyết Danh", cover: "https://img.wattpad.com/cover/290833177-176-k652932.jpg", grade: "Lớp 12", genre: "Truyện" }
        ];

        let currentFilter = 'all';

        // Hàm render sách ra giao diện
        window.renderBooks = function(books) {
            const grid = document.getElementById('book-grid');
            const emptyState = document.getElementById('empty-state');
            grid.innerHTML = '';

            if (books.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'flex';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';

            books.forEach(book => {
                let coverHtml = '';
                if (book.cover) {
                    coverHtml = `<img src="${book.cover}" alt="${book.title}" class="book-cover-img" loading="lazy">`;
                } else {
                    coverHtml = `
                        <div class="book-cover-placeholder">
                            <h3 class="placeholder-title">${book.title}</h3>
                            <span class="placeholder-author">${book.author}</span>
                        </div>`;
                }

                const cardHTML = `
                    <div class="book-card" onclick="goToReader('${book.id}')">
                        <div class="book-cover-container">
                            ${coverHtml}
                            <div class="read-action-overlay">
                                <button class="btn-read-sm"><i class="fas fa-play"></i> Đọc ngay</button>
                            </div>
                        </div>
                        <div class="book-info">
                            <h3 class="book-title" title="${book.title}">${book.title}</h3>
                            <p class="book-author">${book.author}</p>
                            <div class="book-tags">
                                <span class="tag tag-grade">${book.grade}</span>
                                <span class="tag tag-genre">${book.genre}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // Lọc và Tìm kiếm
        window.filterBooks = () => {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = booksData.filter(book => {
                const matchSearch = book.title.toLowerCase().includes(searchText) || book.author.toLowerCase().includes(searchText);
                const matchFilter = currentFilter === 'all' || book.grade.includes(currentFilter) || book.genre.includes(currentFilter);
                return matchSearch && matchFilter;
            });

            window.renderRenderBooks(filtered); 
        }

        window.setFilter = (filterValue, btnEl) => {
            document.querySelectorAll('.pill-btn').forEach(btn => btn.classList.remove('active'));
            btnEl.classList.add('active');
            
            currentFilter = filterValue;
            window.filterBooks();
        }

        // Hiệu ứng load sách
        window.renderRenderBooks = function(data) {
            const grid = document.getElementById('book-grid');
            grid.style.opacity = '0';
            grid.style.transform = 'translateY(15px)';
            
            setTimeout(() => {
                window.renderBooks(data);
                grid.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                grid.style.opacity = '1';
                grid.style.transform = 'translateY(0)';
            }, 150);
        }

        window.goToReader = (slug) => {
            window.location.href = `read.html?id=${slug}`;
        };

        window.addEventListener('DOMContentLoaded', () => {
            window.renderBooks(booksData);
        });

    </script>

    <script type="text/javascript">
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
            if (e.ctrlKey) {
                switch (e.key.toLowerCase()) {
                    case 'u': case 's': case 'p': e.preventDefault(); return false;
                }
                if (e.shiftKey) {
                    switch (e.key.toLowerCase()) {
                        case 'i': case 'j': case 'c': e.preventDefault(); return false;
                    }
                }
            }
        });
    </script>
</body>
</html>
