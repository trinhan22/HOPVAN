<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đang Bảo Trì - HopVan</title>
    <link rel="icon" type="image/webp" href="LOGO.WEBP" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FFF5EC; overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; animation: float 10s infinite alternate; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 50px); } }
    </style>
</head>
<body class="h-screen flex items-center justify-center relative">

    <div class="fixed inset-0 pointer-events-none">
        <div class="blob w-96 h-96 bg-orange-300 top-0 left-0"></div>
        <div class="blob w-80 h-80 bg-red-200 bottom-0 right-0"></div>
    </div>

    <div class="bg-white/80 backdrop-blur-xl p-10 rounded-3xl shadow-2xl max-w-lg w-full text-center border border-white m-4 relative z-10">
        <div class="w-24 h-24 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-6 text-orange-500 text-4xl animate-bounce">
            <i class="fas fa-tools"></i>
        </div>
        
        <h1 class="text-3xl font-black text-gray-800 mb-3">Hệ thống đang bảo trì</h1>
        <p class="text-gray-500 font-medium mb-6">Chúng tôi đang nâng cấp hệ thống để phục vụ bạn tốt hơn.</p>
        
        <div class="bg-orange-50 border border-orange-100 p-4 rounded-xl text-sm text-orange-800 mb-6 italic" id="maintain-reason">
            "Vui lòng quay lại sau ít phút..."
        </div>

        <div class="flex justify-center gap-4 text-xs font-bold text-gray-400 uppercase tracking-widest">
            <span><i class="far fa-clock mr-1"></i> Bắt đầu: <span id="start-time" class="text-gray-600">--:--</span></span>
            <span>|</span>
            <span><i class="far fa-bell mr-1"></i> Kết thúc: <span id="end-time" class="text-gray-600">--:--</span></span>
        </div>

        <div class="mt-8">
            <div class="w-full bg-gray-100 rounded-full h-1.5 mb-2 overflow-hidden">
                <div class="bg-orange-500 h-1.5 rounded-full animate-[loading_2s_ease-in-out_infinite]" style="width: 50%"></div>
            </div>
            <p class="text-[10px] text-gray-400">Trang sẽ tự động tải lại khi bảo trì hoàn tất.</p>
        </div>
    </div>

    <style>
        @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAJ9C2biYeiLPmhakzLZ4mEqfO9_VgPSZE", authDomain: "hopvan-9a648.firebaseapp.com", projectId: "hopvan-9a648", storageBucket: "hopvan-9a648.appspot.com", messagingSenderId: "429347196227", appId: "1:429347196227:web:917b8d019f0efd0f7833f6", measurementId: "G-1BG8PSRG0R" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Lắng nghe trạng thái bảo trì
        onSnapshot(doc(db, "system_settings", "general"), (doc) => {
            if (doc.exists()) {
                const data = doc.data();
                
                // Nếu Admin TẮT bảo trì -> Tự động chuyển về trang chủ
                if (data.maintenanceMode === false) {
                    window.location.href = "index.html"; 
                }

                // Cập nhật giao diện
                if (data.maintenanceReason) {
                    document.getElementById('maintain-reason').innerText = `"${data.maintenanceReason}"`;
                }
                
                if (data.maintenanceStartTime) {
                    document.getElementById('start-time').innerText = new Date(data.maintenanceStartTime.seconds * 1000).toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'});
                }
                if (data.maintenanceEndTime) {
                    document.getElementById('end-time').innerText = new Date(data.maintenanceEndTime.seconds * 1000).toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'});
                }
            }
        });
    </script>
</body>
</html>
