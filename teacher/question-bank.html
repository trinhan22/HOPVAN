    <style>
        :root {
            --primary: #FF8F50;
            --primary-gradient: linear-gradient(135deg, #FF8F50, #FF5E62);
            --bg-glass: rgba(255, 255, 255, 0.8);
            --blur: 24px;
            --sidebar-width: 280px;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #FFF5EC; 
            height: 100vh; overflow: hidden; display: flex; 
        }
                        
        /* --- BACKGROUND --- */
        .background-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.2; animation: floatBlob 10s infinite alternate; }
        .blob-1 { width: 500px; height: 500px; background: #FCA96A; top: -100px; left: -100px; }
        .blob-2 { width: 400px; height: 400px; background: #FCD5B5; bottom: -50px; right: -50px; animation-delay: -5s; }
        .blob-3 { width: 300px; height: 300px; background: #FFD1D1; top: 40%; left: 40%; animation-delay: -2s; }
        @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }

        aside { width: var(--sidebar-width); background: rgba(255,255,255,0.9); border-right: 1px solid white; display: flex; flex-direction: column; z-index: 50; backdrop-filter: blur(20px); }
        .nav-item {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 24px; margin: 4px 16px; border-radius: 16px;
            color: #64748B; font-weight: 700; font-size: 0.95rem;
            cursor: pointer; text-decoration: none; transition: 0.3s;
        }
        .nav-item:hover { background: rgba(255, 143, 80, 0.1); color: var(--primary); }
        .nav-item.active { background: var(--primary-gradient); color: white; box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4); }
        .nav-item.active i { color: white; }

        /* --- MAIN CONTENT --- */
        .right-panel { 
            flex: 1; display: flex; flex-direction: column; 
            background: var(--bg-glass); backdrop-filter: blur(var(--blur)); 
            border-left: 1px solid var(--glass-border); position: relative; 
        }

        /* UI Components */
        .glass-input { width: 100%; padding: 12px 16px; border-radius: 14px; background: #f8fafc; border: 1px solid #e2e8f0; font-weight: 500; outline: none; transition: 0.2s; }
        .glass-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(255, 143, 80, 0.1); }
        
        .tab-btn { padding: 10px 24px; border-radius: 12px; font-weight: 800; color: #94a3b8; transition: 0.2s; cursor: pointer; white-space: nowrap; border: 1px solid transparent; background: transparent; }
        .tab-btn:hover { background: white; color: var(--primary); border-color: #fed7aa; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-color: white; }

        /* Question Card */
        .q-card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 20px; border: 1px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.02); transition: 0.3s; position: relative; }
        .q-card:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(255, 143, 80, 0.1); border-color: #ffedd5; }
        
        .q-content-text { font-family: 'Merriweather', serif; font-size: 1.05rem; line-height: 1.8; color: #334155; margin-bottom: 16px; }
        
        .q-tag { font-size: 10px; font-weight: 900; text-transform: uppercase; padding: 4px 10px; border-radius: 6px; display: inline-block; margin-bottom: 12px; }
        .tag-reading { background: #eff6ff; color: #1d4ed8; }
        .tag-quiz { background: #faf5ff; color: #7e22ce; }
        .tag-essay { background: #f0fdf4; color: #15803d; } 
        .tag-fulltest { background: #fdf4ff; color: #a21caf; } 

        .sub-item { display: flex; align-items: start; gap: 8px; font-size: 0.9rem; color: #475569; margin-bottom: 6px; }
        .sub-bullet { color: var(--primary); font-weight: bold; margin-top: 4px; font-size: 0.7rem; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: white; width: 90%; max-width: 900px; height: 85vh; border-radius: 24px; display: flex; flex-direction: column; box-shadow: 0 25px 60px rgba(0,0,0,0.2); transform: scale(0.95); transition: 0.3s; }
        .modal-overlay.show .modal-box { transform: scale(1); }
        
        .form-label { display: block; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        .ql-toolbar { border-radius: 12px 12px 0 0; background: #f8fafc; border-color: #e2e8f0; }
        .ql-container { border-radius: 0 0 12px 12px; border-color: #e2e8f0; font-family: 'Merriweather', serif; font-size: 1rem; }
        
        #toast { position: fixed; top: 30px; right: 30px; background: white; padding: 15px 25px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 10px; z-index: 10000; transform: translateX(200%); transition: 0.5s; font-weight: bold;}
        #toast.show { transform: translateX(0); }
        
        /* --- SCROLLBAR --- */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="right-panel">
        <header class="h-24 px-10 flex items-center justify-between flex-shrink-0 pt-8 z-30">

                <h2 class="text-3xl font-black text-gray-800">Ngân Hàng Câu Hỏi</h2>

        <main class="flex-1 overflow-x-hidden overflow-y-auto px-10 pb-12 pt-4 custom-scroll">

    <div id="toast"><i class="fas fa-check-circle text-green-500 text-xl"></i> <span id="toast-msg">Thành công</span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAJ9C2biYeiLPmhakzLZ4mEqfO9_VgPSZE", authDomain: "hopvan-9a648.firebaseapp.com", projectId: "hopvan-9a648", storageBucket: "hopvan-9a648.appspot.com", messagingSenderId: "429347196227", appId: "1:429347196227:web:917b8d019f0efd0f7833f6", measurementId: "G-1BG8PSRG0R" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentCollection = 'fulltest_bank'; // Mặc định mở tab Full đề
        let allQuestions = [];
        let editors = {};

        const FULL_TOOLBAR = [
            ['bold', 'italic', 'underline', 'strike'],
            [{ 'header': [2, 3, false] }],
            ['blockquote'], 
            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
            [{ 'align': [] }],
            ['clean']
        ];

        const createQ = (sel, content) => {
            const el = document.querySelector(sel);
            if (!el) return null;
            el.innerHTML = ''; 
            const q = new Quill(sel, { theme: 'snow', modules: { toolbar: FULL_TOOLBAR } }); 
            if (content) q.clipboard.dangerouslyPasteHTML(content);
            return q;
        };

        // Kích hoạt khi Đăng nhập
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const snap = await getDoc(doc(db, "users", user.uid));
                if(snap.exists()) {
                    const d = snap.data();
                    document.getElementById('teacher-name').innerText = d.name;
                    if(d.photoURL) document.getElementById('user-avatar').innerHTML = `<img src="${d.photoURL}" class="w-full h-full object-cover">`;
                }
                loadBank(currentCollection); // Load dữ liệu
            } else {
                window.location.href = "../log.html";
            }
        });

        // 1. LOAD DANH SÁCH (Theo loại Collection)
        window.loadBank = (colName, btnEl = null) => {
            currentCollection = colName;
            
            if(btnEl) {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('active', 'bg-white', 'text-primary', 'shadow-sm');
                    b.classList.add('text-gray-500');
                });
                btnEl.classList.remove('text-gray-500');
                btnEl.classList.add('active', 'bg-white', 'text-primary', 'shadow-sm');
            }

            const container = document.getElementById('questions-container');
            container.innerHTML = '<div class="text-center py-20"><i class="fas fa-circle-notch fa-spin text-orange-500 text-4xl"></i></div>';
            
            const q = query(collection(db, colName), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snap) => {
                allQuestions = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderFiltered();
            });
        };

        // Hàm render lại dựa trên ô Search
        window.renderFiltered = () => {
            const container = document.getElementById('questions-container');
            const search = document.getElementById('search-input').value.toLowerCase();

            const filtered = allQuestions.filter(q => {
                const content = (q.title || q.topic || q.question || q.reading_text || '').toLowerCase();
                return content.includes(search);
            });

            if(!filtered.length) {
                container.innerHTML = `<div class="text-center py-20 bg-white/40 rounded-3xl border-2 border-dashed border-gray-200">
                    <div class="text-gray-300 text-5xl mb-4"><i class="fas fa-folder-open"></i></div>
                    <p class="text-gray-500 font-bold">Không tìm thấy dữ liệu.</p>
                </div>`;
                return;
            }

            container.innerHTML = filtered.map(data => {
                const isOwn = data.authorId === currentUser.uid;
                let body = '', badgeClass = '', label = '';

                if (currentCollection === 'fulltest_bank') {
                    label = 'FULL ĐỀ THI'; badgeClass = 'tag-fulltest';
                    
                    let divText = document.createElement('div');
                    divText.innerHTML = data.reading_text || '';
                    let plainText = divText.textContent || divText.innerText || '';
                    
                    body = `<div class="q-content-text line-clamp-3">${plainText}</div>
                            <div class="space-y-1">
                                <div class="sub-item"><span class="sub-bullet"><i class="fas fa-caret-right"></i></span> Đọc Hiểu: ${(data.reading_questions||[]).length} câu</div>
                                <div class="sub-item"><span class="sub-bullet"><i class="fas fa-caret-right"></i></span> NLXH (2đ)</div>
                                <div class="sub-item"><span class="sub-bullet"><i class="fas fa-caret-right"></i></span> NLVH (4đ)</div>
                            </div>`;
                } 
                else if (currentCollection === 'reading_bank') {
                    label = 'ĐỌC HIỂU'; badgeClass = 'tag-reading';
                    
                    let divText = document.createElement('div');
                    divText.innerHTML = data.text || '';
                    let plainText = divText.textContent || divText.innerText || '';
                    
                    body = `
                            <h4 class="font-bold text-gray-800 mb-2">${data.title || 'Văn bản đọc hiểu'}</h4>
                            <div class="q-content-text line-clamp-3">${plainText}</div>
                            <div class="space-y-1">
                                ${(data.questions||[]).map(q => `
                                    <div class="sub-item"><span class="sub-bullet"><i class="fas fa-caret-right"></i></span> ${q.q}</div>
                                `).join('')}
                            </div>`;
                }
                else if (currentCollection === 'quiz_bank') {
                    label = 'TRẮC NGHIỆM'; badgeClass = 'tag-quiz';
                    body = `<div class="q-content-text mb-4">${data.question}</div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
                                ${(data.options||[]).map((o, i) => `
                                    <div class="p-3 rounded-xl border ${i === data.correct ? 'bg-green-50 border-green-200 text-green-700 font-bold' : 'bg-white border-gray-100 text-gray-500'}">
                                        ${String.fromCharCode(65+i)}. ${o}
                                    </div>
                                `).join('')}
                            </div>`;
                } 
                else { // essay_bank
                    if(data.type === 'nlvh') {
                        label = 'NL VĂN HỌC'; badgeClass = 'bg-orange-100 text-orange-600';
                    } else {
                        label = 'NL XÃ HỘI'; badgeClass = 'tag-essay';
                    }

                    // Tách các câu Hint ra
                    let divHint = document.createElement('div');
                    divHint.innerHTML = data.hint || '';
                    let rawHints = divHint.textContent.split('[ENTER]').map(x => x.trim()).filter(x => x);

                    body = `<div class="q-content-text font-bold text-gray-800">${data.topic}</div>
                            ${data.workName ? `<div class="text-xs text-gray-500 mb-3 italic">Tác phẩm: ${data.workName}</div>` : ''}
                            <div class="bg-orange-50 p-4 rounded-xl mt-3">
                                <p class="text-[10px] uppercase font-bold text-orange-400 mb-2">Gợi ý chấm điểm:</p>
                                <div class="space-y-1 text-sm text-gray-600">
                                    ${rawHints.map(h => `<div class="sub-item"><span class="sub-bullet">•</span> ${h}</div>`).join('')}
                                </div>
                            </div>`;
                }

                return `
                <div class="q-card group">
                    <div class="flex justify-between items-start mb-3">
                        <span class="q-tag ${badgeClass}">${label}</span>
                        ${isOwn ? `
                            <div class="opacity-0 group-hover:opacity-100 transition flex gap-2">
                                <button onclick="openModal('${data.id}')" class="w-8 h-8 rounded-lg bg-blue-50 text-blue-500 hover:bg-blue-100 flex items-center justify-center"><i class="fas fa-pen text-xs"></i></button>
                                <button onclick="deleteQ('${data.id}')" class="w-8 h-8 rounded-lg bg-red-50 text-red-500 hover:bg-red-100 flex items-center justify-center"><i class="fas fa-trash text-xs"></i></button>
                            </div>
                        ` : '<span class="text-xs text-gray-400 italic font-medium"><i class="fas fa-globe-asia mr-1"></i>Đề tham khảo</span>'}
                    </div>
                    ${body}
                </div>`;
            }).join('');
        };

        window.toggleGenreInput = () => {
            const type = document.getElementById('ex-type').value;
            const genreDiv = document.getElementById('genre-wrapper');
            const workDiv = document.getElementById('work-wrapper');
            if (type === 'nlvh') {
                genreDiv.classList.remove('hidden');
                workDiv.classList.remove('hidden');
            } else {
                genreDiv.classList.add('hidden');
                workDiv.classList.add('hidden');
            }
        };

        // 2. MODAL LOGIC TẠO/SỬA (Chung form với Admin)
        window.openModal = async (id) => {
            const modal = document.getElementById('q-modal');
            const container = document.getElementById('modal-fields');
            const colName = currentCollection;
            
            document.getElementById('exam-collection').value = colName;
            document.getElementById('exam-id').value = id;
            modal.classList.add('show');
            container.innerHTML = '<div class="text-center py-20"><i class="fas fa-spinner fa-spin text-orange-500 text-3xl"></i></div>';

            let data = {};
            if(id !== 'new') {
                const snap = await getDoc(doc(db, colName, id));
                if(snap.exists()) data = snap.data();
            }

            let html = '';
            
            if (colName === 'fulltest_bank') {
                document.getElementById('modal-title').innerText = "Tạo Full Đề Thi";
                html = `
                <div class="space-y-6">
                    <div><label class="form-label text-blue-600">I. NGỮ LIỆU ĐỌC HIỂU</label><div class="bg-white rounded-2xl border border-gray-200 overflow-hidden"><div id="edit-ft-read-text" style="height: 200px;"></div></div></div>
                    <div><label class="form-label text-blue-600">II. CÂU HỎI ĐỌC HIỂU</label><div class="text-[10px] text-gray-400 mb-2"><i class="fas fa-info-circle"></i> Dùng thẻ <b>[NEXT]</b> để tách các câu hỏi.</div><div class="bg-white rounded-2xl border border-gray-200 overflow-hidden"><div id="edit-ft-read-qs" style="height: 150px;"></div></div></div>
                    <div class="grid grid-cols-2 gap-6">
                        <div><label class="form-label text-green-600">III. CÂU 1 (2đ)</label><div class="bg-white rounded-2xl border border-gray-200 overflow-hidden"><div id="edit-ft-nlxh" style="height: 150px;"></div></div></div>
                        <div><label class="form-label text-orange-600">IV. CÂU 2 (4đ)</label><div class="bg-white rounded-2xl border border-gray-200 overflow-hidden"><div id="edit-ft-nlvh" style="height: 150px;"></div></div></div>
                    </div>
                    <div class="bg-green-50/50 p-4 rounded-2xl border border-green-100"><label class="form-label text-green-600"><i class="fas fa-robot"></i> GỢI Ý CHẤM (AI PROMPT)</label><div class="bg-white rounded-xl border border-gray-200 overflow-hidden mt-2"><div id="edit-ex-hint" style="height: 120px;"></div></div></div>
                </div>`;
            } 
            else if (colName === 'quiz_bank') {
                document.getElementById('modal-title').innerText = "Tạo Trắc Nghiệm";
                html = `
                <div class="space-y-6">
                    <div>
                        <label class="form-label text-purple-600">CÂU HỎI TRẮC NGHIỆM</label>
                        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden"><div id="edit-ex-q" style="height: 120px;"></div></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        ${['A', 'B', 'C', 'D'].map((label, i) => `
                            <div class="flex items-center gap-4 glass-input">
                                <input type="radio" name="correct-choice" value="${i}" class="w-5 h-5 accent-purple-600" ${data.correct === i ? 'checked' : ''}>
                                <span class="font-black text-purple-300 w-6">${label}</span>
                                <input id="ex-opt-${i}" class="bg-transparent outline-none flex-1 font-bold text-gray-700" value="${data.options?.[i] || ''}" placeholder="Nhập đáp án ${label}...">
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            } 
            else if (colName === 'reading_bank') {
                document.getElementById('modal-title').innerText = "Tạo Đề Đọc Hiểu";
                html = `
                <div class="space-y-6">
                    <div>
                        <label class="form-label">TIÊU ĐỀ BÀI ĐỌC</label>
                        <input id="ex-title" class="glass-input font-bold" value="${data.title||''}" placeholder="VD: Đất Nước - Nguyễn Đình Thi">
                    </div>
                    <div>
                        <label class="form-label">VĂN BẢN / NGỮ LIỆU</label>
                        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden"><div id="edit-ex-text" style="height: 250px;"></div></div>
                    </div>
                    <div>
                        <label class="form-label">DANH SÁCH CÂU HỎI</label>
                        <div class="text-[10px] text-gray-400 mb-2"><i class="fas fa-info-circle"></i> Dùng thẻ <b>[NEXT]</b> để tách các câu hỏi.</div>
                        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden"><div id="edit-ex-qs" style="height: 150px;"></div></div>
                    </div>
                    <div class="bg-green-50/50 p-4 rounded-2xl border border-green-100">
                        <label class="form-label text-green-600"><i class="fas fa-robot"></i> GỢI Ý CHẤM (AI PROMPT)</label>
                        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden mt-2"><div id="edit-ex-hint" style="height: 120px;"></div></div>
                    </div>
                </div>`;
            } 
            else { // essay_bank
                document.getElementById('modal-title').innerText = "Tạo Đề Làm Văn";
                const currentType = data.type || 'nlxh'; 
                const isNlvh = currentType === 'nlvh';
                
                html = `
                <div class="flex gap-4 mb-4">
                    <div class="flex-1">
                        <label class="form-label">LOẠI ĐỀ</label>
                        <select id="ex-type" class="glass-input font-bold" onchange="toggleGenreInput()">
                            <option value="nlxh" ${currentType === 'nlxh' ? 'selected' : ''}>Nghị Luận Xã Hội</option>
                            <option value="nlvh" ${currentType === 'nlvh' ? 'selected' : ''}>Nghị Luận Văn Học</option>
                        </select>
                    </div>
                    <div id="genre-wrapper" class="flex-1 ${isNlvh ? '' : 'hidden'}">
                        <label class="form-label">THỂ LOẠI</label>
                        <select id="ex-genre" class="glass-input font-bold">
                            <option value="Truyện" ${data.genre === 'Truyện' ? 'selected' : ''}>Truyện</option>
                            <option value="Thơ" ${data.genre === 'Thơ' ? 'selected' : ''}>Thơ</option>
                            <option value="Kịch" ${data.genre === 'Kịch' ? 'selected' : ''}>Kịch</option>
                            <option value="Ký" ${data.genre === 'Ký' ? 'selected' : ''}>Ký</option>
                        </select>
                    </div>
                </div>
                <div id="work-wrapper" class="mb-6 ${isNlvh ? '' : 'hidden'}">
                    <label class="form-label">TÊN TÁC PHẨM (NẾU CÓ)</label>
                    <input id="ex-work" class="glass-input" value="${data.workName || ''}" placeholder="VD: Vợ chồng A Phủ">
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="form-label text-orange-600">YÊU CẦU ĐỀ BÀI</label>
                        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden"><div id="edit-ex-topic" style="height: 120px;"></div></div>
                    </div>
                    <div>
                        <label class="form-label">NGỮ LIỆU PHỤ / TRÍCH DẪN</label>
                        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden"><div id="edit-ex-text" style="height: 150px;"></div></div>
                    </div>
                    <div class="bg-green-50/50 p-4 rounded-2xl border border-green-100">
                        <label class="form-label text-green-600"><i class="fas fa-robot"></i> GỢI Ý CHẤM (Dùng ENTER để ngắt ý)</label>
                        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden mt-2"><div id="edit-ex-hint" style="height: 120px;"></div></div>
                    </div>
                </div>`;
            }

            container.innerHTML = html;

            setTimeout(() => {
                editors = {};
                if (colName === 'fulltest_bank') {
                    editors.readText = createQ('#edit-ft-read-text', data.reading_text);
                    editors.readQs = createQ('#edit-ft-read-qs', (data.reading_questions||[]).join('<p>[NEXT]</p>'));
                    editors.nlxh = createQ('#edit-ft-nlxh', data.nlxh_topic);
                    editors.nlvh = createQ('#edit-ft-nlvh', data.nlvh_topic);
                    editors.hint = createQ('#edit-ex-hint', data.hint); 
                } 
                else if (colName === 'quiz_bank') {
                    editors.q = createQ('#edit-ex-q', data.question);
                } 
                else if (colName === 'reading_bank') {
                    editors.text = createQ('#edit-ex-text', data.text);
                    editors.qs = createQ('#edit-ex-qs', (data.questions||[]).map(x=>x.q).join('<p>[NEXT]</p>'));
                    editors.hint = createQ('#edit-ex-hint', data.hint);
                } 
                else { // essay_bank
                    editors.topic = createQ('#edit-ex-topic', data.topic);
                    editors.text = createQ('#edit-ex-text', data.text);
                    
                    let hintStr = '';
                    if (data.hint && Array.isArray(data.hint)) {
                        hintStr = data.hint.join(' <br>[ENTER]<br> ');
                    } else if (typeof data.hint === 'string') {
                        hintStr = data.hint;
                    }
                    editors.hint = createQ('#edit-ex-hint', hintStr);
                }
            }, 100);
        };

        window.closeModal = () => document.getElementById('q-modal').classList.remove('show');

        // 3. LƯU DỮ LIỆU
        window.saveExamData = async () => {
            const id = document.getElementById('exam-id').value;
            const colName = document.getElementById('exam-collection').value;
            const btnSave = document.getElementById('btn-save');
            
            let docData = { 
                updatedAt: serverTimestamp(),
                authorId: currentUser.uid // Gán ID giáo viên
            };
            
            btnSave.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
            btnSave.disabled = true;

            try {
                if (colName === 'fulltest_bank') {
                   docData.reading_text = editors.readText.root.innerHTML;
                   docData.reading_questions = editors.readQs.root.innerHTML.split('[NEXT]').map(q => q.replace(/<[^>]*>/g, '').trim()).filter(x => x);
                   docData.nlxh_topic = editors.nlxh.root.innerHTML;
                   docData.nlvh_topic = editors.nlvh.root.innerHTML;
                   docData.hint = editors.hint.root.innerHTML;
                } else if (colName === 'quiz_bank') {
                   docData.question = editors.q.root.innerHTML;
                   docData.options = [0,1,2,3].map(i => document.getElementById(`ex-opt-${i}`).value);
                   docData.correct = parseInt(document.querySelector('input[name="correct-choice"]:checked')?.value || 0);
                } else if (colName === 'reading_bank') {
                   docData.title = document.getElementById('ex-title').value;
                   docData.text = editors.text.root.innerHTML;
                   docData.questions = editors.qs.root.innerHTML.split('[NEXT]').map(q => ({ q: q.replace(/<[^>]*>/g, '').trim() })).filter(x => x.q);
                   docData.hint = editors.hint.root.innerHTML;
                } else {
                   docData.type = document.getElementById('ex-type').value;
                   docData.topic = editors.topic.root.innerHTML;
                   docData.text = editors.text.root.innerHTML;
                   
                   let rawHint = editors.hint.root.innerText || editors.hint.root.textContent; 
                   docData.hint = rawHint.split('[ENTER]').map(x => x.trim()).filter(x => x !== "");
                   
                   if (docData.type === 'nlvh') {
                       docData.genre = document.getElementById('ex-genre').value;
                       docData.workName = document.getElementById('ex-work').value;
                   }
                }

                if (id === 'new') {
                    docData.createdAt = serverTimestamp();
                    docData.status = 'published'; 
                    await addDoc(collection(db, colName), docData);
                    showToast("Đã thêm mới!");
                } else {
                    await updateDoc(doc(db, colName, id), docData);
                    showToast("Đã cập nhật!");
                }
                
                closeModal();
            } catch (e) {
                console.error(e); 
                alert("Lỗi khi lưu: " + e.message);
            } finally {
                btnSave.innerHTML = '<i class="fas fa-save"></i> Lưu Dữ Liệu';
                btnSave.disabled = false;
            }
        };

        window.deleteQ = async (id) => { 
            if(confirm("Xóa vĩnh viễn câu hỏi/đề thi này?")) { 
                try {
                    await deleteDoc(doc(db, currentCollection, id)); 
                    showToast("Đã xóa!"); 
                } catch(e) {
                    alert("Lỗi: Bạn không có quyền xóa dữ liệu này.");
                }
            } 
        };

        function showToast(m) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = m;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }

        document.getElementById('logout-btn').onclick = () => signOut(auth);
    </script>
</body>
</html>
